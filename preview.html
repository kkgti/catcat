<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>变身躲猫猫 - 预览版</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
}
canvas {
  display: block;
  max-width: 100vw;
  max-height: 100vh;
}
#startScreen {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  z-index: 10;
}
#startScreen.hidden { display: none; }
.title-emoji { font-size: 80px; margin-bottom: 10px; }
.title { font-size: 36px; font-weight: bold; color: #ffd700; margin-bottom: 8px; }
.subtitle { font-size: 14px; color: #aaa; margin-bottom: 30px; }
.info-card {
  background: rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 20px 30px;
  margin-bottom: 40px;
  max-width: 300px;
  text-align: center;
}
.info-card p { color: #ddd; font-size: 14px; line-height: 1.8; }
.start-btn {
  width: 200px; height: 50px;
  background: linear-gradient(135deg, #ffd700, #ffaa00);
  border: none; border-radius: 25px;
  font-size: 18px; font-weight: bold;
  color: #1a1a2e; cursor: pointer;
  box-shadow: 0 4px 15px rgba(255,215,0,0.3);
}
.start-btn:active { transform: scale(0.95); }
.level-select { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; max-width: 360px; }
.level-card {
  width: 105px; padding: 14px 8px; border-radius: 14px;
  background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.1);
  text-align: center; cursor: pointer; transition: all 0.2s;
}
.level-card:active { transform: scale(0.95); }
.level-card.unlocked:hover { border-color: #ffd700; background: rgba(255,215,0,0.1); }
.level-card.locked { opacity: 0.4; cursor: default; }
.level-card .lc-emoji { font-size: 32px; }
.level-card .lc-name { color: #fff; font-size: 15px; font-weight: bold; margin: 6px 0 2px; }
.level-card .lc-desc { color: #aaa; font-size: 11px; line-height: 1.3; }
.level-card .lc-stars { font-size: 16px; margin-top: 6px; }
.level-card .lc-lock { font-size: 24px; color: #888; }

<body>

<div id="startScreen">
  <div class="title-emoji">🐱</div>
  <div class="title">变身躲猫猫</div>
  <div class="subtitle">Prop Hunt - 找出伪装的猫咪!</div>
  <div class="info-card">
    <p>猫咪变成了房间里的物品<br>滑动探索房间，观察可疑动静<br>点击可疑物品，找出所有猫咪<br>小心！点错会扣一颗心 ❤️</p>
  </div>
  <div id="levelSelect" class="level-select"></div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
// ==================== 音效系统 ====================
var SFX = (function() {
  var audioCtx = null;
  var muted = false;

  function ctx() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    }
    return audioCtx;
  }

  function play(freq, duration, type, vol) {
    if (muted) return;
    var c = ctx(); if (!c) return;
    var osc = c.createOscillator();
    var gain = c.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol || 0.15, c.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + duration);
    osc.connect(gain); gain.connect(c.destination);
    osc.start(c.currentTime);
    osc.stop(c.currentTime + duration);
  }

  return {
    // 找到猫咪 — 上升音阶，欢快
    catFound: function() {
      play(523, 0.12, 'sine', 0.12);      // C5
      setTimeout(function(){ play(659, 0.12, 'sine', 0.12); }, 80);  // E5
      setTimeout(function(){ play(784, 0.2, 'sine', 0.15); }, 160);  // G5
    },
    // 点错 — 低沉短促
    wrong: function() {
      play(200, 0.15, 'square', 0.08);
      setTimeout(function(){ play(150, 0.2, 'square', 0.06); }, 100);
    },
    // 胜利 — 完整上升和弦
    win: function() {
      play(523, 0.15, 'sine', 0.10);      // C5
      setTimeout(function(){ play(659, 0.15, 'sine', 0.10); }, 120);  // E5
      setTimeout(function(){ play(784, 0.15, 'sine', 0.10); }, 240);  // G5
      setTimeout(function(){ play(1047, 0.3, 'sine', 0.12); }, 360);  // C6
    },
    // 失败 — 下降音
    lose: function() {
      play(400, 0.2, 'sawtooth', 0.06);
      setTimeout(function(){ play(300, 0.2, 'sawtooth', 0.06); }, 150);
      setTimeout(function(){ play(200, 0.3, 'sawtooth', 0.05); }, 300);
    },
    // 按钮点击
    tap: function() {
      play(880, 0.05, 'sine', 0.06);
    },
    // 成就解锁
    achieve: function() {
      play(784, 0.12, 'sine', 0.10);
      setTimeout(function(){ play(988, 0.12, 'sine', 0.10); }, 100);
      setTimeout(function(){ play(1175, 0.25, 'triangle', 0.12); }, 200);
    },
    // 倒计时滴答
    tick: function() {
      play(1000, 0.03, 'sine', 0.04);
    },
    // 工具使用
    toolUse: function() {
      play(600, 0.08, 'triangle', 0.08);
      setTimeout(function(){ play(800, 0.1, 'triangle', 0.08); }, 60);
    },
    toggleMute: function() { muted = !muted; return muted; },
    isMuted: function() { return muted; },
  };
})();

// ==================== 环境音效系统 ====================
var AmbientSound = (function() {
  var audioCtx = null;
  var activeTimers = [];
  var activeNodes = [];
  var running = false;

  function ctx() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    }
    return audioCtx;
  }

  // 时钟滴答：客厅 / 书房
  function startClock() {
    var id = setInterval(function() {
      if (SFX.isMuted()) return;
      var c = ctx(); if (!c) return;
      var osc = c.createOscillator();
      var gain = c.createGain();
      osc.type = 'sine';
      osc.frequency.value = 1800;
      gain.gain.setValueAtTime(0.03, c.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.04);
      osc.connect(gain); gain.connect(c.destination);
      osc.start(c.currentTime);
      osc.stop(c.currentTime + 0.04);
    }, 1000);
    activeTimers.push(id);
  }

  // 鱼缸气泡：客厅
  function startBubbles() {
    function playBubble() {
      if (!running) return;
      if (!SFX.isMuted()) {
        var c = ctx();
        if (c) {
          var osc = c.createOscillator();
          var gain = c.createGain();
          osc.type = 'sine';
          var baseFreq = 600 + Math.random() * 400;
          osc.frequency.setValueAtTime(baseFreq, c.currentTime);
          osc.frequency.exponentialRampToValueAtTime(baseFreq * 2.5, c.currentTime + 0.08);
          gain.gain.setValueAtTime(0.025, c.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.1);
          osc.connect(gain); gain.connect(c.destination);
          osc.start(c.currentTime);
          osc.stop(c.currentTime + 0.1);
        }
      }
      var delay = 800 + Math.random() * 2200;
      var tid = setTimeout(playBubble, delay);
      activeTimers.push(tid);
    }
    var tid = setTimeout(playBubble, 500 + Math.random() * 1500);
    activeTimers.push(tid);
  }

  // 风声：卧室（低频白噪声）
  function startWind() {
    var c = ctx(); if (!c) return;
    var bufferSize = c.sampleRate * 2;
    var buffer = c.createBuffer(1, bufferSize, c.sampleRate);
    var data = buffer.getChannelData(0);
    for (var i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
    var noise = c.createBufferSource();
    noise.buffer = buffer;
    noise.loop = true;
    var filter = c.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 400;
    filter.Q.value = 0.7;
    var gain = c.createGain();
    gain.gain.value = SFX.isMuted() ? 0 : 0.04;
    noise.connect(filter); filter.connect(gain); gain.connect(c.destination);
    noise.start();
    activeNodes.push({ source: noise, gain: gain });
    var id = setInterval(function() {
      gain.gain.value = SFX.isMuted() ? 0 : 0.04;
    }, 300);
    activeTimers.push(id);
  }

  // 水滴声：厨房 / 浴室
  function startDrips() {
    function playDrip() {
      if (!running) return;
      if (!SFX.isMuted()) {
        var c = ctx();
        if (c) {
          var osc = c.createOscillator();
          var gain = c.createGain();
          osc.type = 'sine';
          var freq = 1200 + Math.random() * 800;
          osc.frequency.setValueAtTime(freq, c.currentTime);
          osc.frequency.exponentialRampToValueAtTime(freq * 0.4, c.currentTime + 0.12);
          gain.gain.setValueAtTime(0.035, c.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.15);
          osc.connect(gain); gain.connect(c.destination);
          osc.start(c.currentTime);
          osc.stop(c.currentTime + 0.15);
        }
      }
      var delay = 1500 + Math.random() * 4000;
      var tid = setTimeout(playDrip, delay);
      activeTimers.push(tid);
    }
    var tid = setTimeout(playDrip, 300 + Math.random() * 2000);
    activeTimers.push(tid);
  }

  return {
    startAmbient: function(roomId) {
      this.stopAmbient();
      running = true;
      switch (roomId) {
        case 'livingroom': startClock(); startBubbles(); break;
        case 'kitchen': startDrips(); break;
        case 'bedroom': startWind(); break;
        case 'bathroom': startDrips(); break;
        case 'study': startClock(); break;
      }
    },
    stopAmbient: function() {
      running = false;
      for (var i = 0; i < activeTimers.length; i++) {
        clearInterval(activeTimers[i]); clearTimeout(activeTimers[i]);
      }
      activeTimers = [];
      for (var j = 0; j < activeNodes.length; j++) {
        try { activeNodes[j].source.stop(); } catch(e) {}
      }
      activeNodes = [];
    }
  };
})();

// ==================== draw-utils ====================
var DrawUtils = {
  roundRect: function(ctx, x, y, w, h, r, fill, stroke) {
    ctx.beginPath();
    ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
    ctx.arcTo(x + w, y, x + w, y + r, r);
    ctx.lineTo(x + w, y + h - r);
    ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
    ctx.lineTo(x + r, y + h);
    ctx.arcTo(x, y + h, x, y + h - r, r);
    ctx.lineTo(x, y + r);
    ctx.arcTo(x, y, x + r, y, r);
    ctx.closePath();
    if (fill) { ctx.fillStyle = fill; ctx.fill(); }
    if (stroke) { ctx.strokeStyle = stroke; ctx.stroke(); }
  },
  ellipse: function(ctx, cx, cy, rx, ry, fill) {
    ctx.beginPath();
    ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
    ctx.fillStyle = fill; ctx.fill();
  },
  drawCat: function(ctx, x, y, size, color) {
    var s = size;
    this.ellipse(ctx, x, y + s*0.1, s*0.35, s*0.3, color);
    ctx.beginPath(); ctx.arc(x, y - s*0.2, s*0.22, 0, Math.PI*2); ctx.fillStyle = color; ctx.fill();
    // 耳朵
    ctx.beginPath(); ctx.moveTo(x-s*0.18,y-s*0.35); ctx.lineTo(x-s*0.08,y-s*0.52); ctx.lineTo(x+s*0.02,y-s*0.35); ctx.fillStyle=color; ctx.fill();
    ctx.beginPath(); ctx.moveTo(x-s*0.15,y-s*0.36); ctx.lineTo(x-s*0.09,y-s*0.47); ctx.lineTo(x,y-s*0.36); ctx.fillStyle='#ff9999'; ctx.fill();
    ctx.beginPath(); ctx.moveTo(x+s*0.18,y-s*0.35); ctx.lineTo(x+s*0.08,y-s*0.52); ctx.lineTo(x-s*0.02,y-s*0.35); ctx.fillStyle=color; ctx.fill();
    ctx.beginPath(); ctx.moveTo(x+s*0.15,y-s*0.36); ctx.lineTo(x+s*0.09,y-s*0.47); ctx.lineTo(x,y-s*0.36); ctx.fillStyle='#ff9999'; ctx.fill();
    // 眼睛
    ctx.beginPath(); ctx.arc(x-s*0.08,y-s*0.22,s*0.045,0,Math.PI*2); ctx.fillStyle='#333'; ctx.fill();
    ctx.beginPath(); ctx.arc(x+s*0.08,y-s*0.22,s*0.045,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x-s*0.06,y-s*0.24,s*0.018,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
    ctx.beginPath(); ctx.arc(x+s*0.10,y-s*0.24,s*0.018,0,Math.PI*2); ctx.fill();
    // 鼻+嘴
    ctx.beginPath(); ctx.moveTo(x,y-s*0.15); ctx.lineTo(x-s*0.03,y-s*0.12); ctx.lineTo(x+s*0.03,y-s*0.12); ctx.fillStyle='#ff9999'; ctx.fill();
    ctx.beginPath(); ctx.moveTo(x,y-s*0.12); ctx.quadraticCurveTo(x-s*0.06,y-s*0.07,x-s*0.09,y-s*0.09); ctx.strokeStyle='#555'; ctx.lineWidth=1.2; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x,y-s*0.12); ctx.quadraticCurveTo(x+s*0.06,y-s*0.07,x+s*0.09,y-s*0.09); ctx.stroke();
    // 胡须
    ctx.lineWidth=0.8; ctx.strokeStyle='#888';
    ctx.beginPath(); ctx.moveTo(x-s*0.12,y-s*0.14); ctx.lineTo(x-s*0.28,y-s*0.17); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x-s*0.12,y-s*0.11); ctx.lineTo(x-s*0.28,y-s*0.11); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+s*0.12,y-s*0.14); ctx.lineTo(x+s*0.28,y-s*0.17); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+s*0.12,y-s*0.11); ctx.lineTo(x+s*0.28,y-s*0.11); ctx.stroke();
    // 尾巴
    ctx.beginPath(); ctx.moveTo(x+s*0.3,y+s*0.15); ctx.quadraticCurveTo(x+s*0.5,y-s*0.05,x+s*0.4,y-s*0.15);
    ctx.strokeStyle=color; ctx.lineWidth=s*0.06; ctx.lineCap='round'; ctx.stroke(); ctx.lineCap='butt';
  }
};

// ==================== 常量 ====================
var VIEW_W = 750, VIEW_H = 900;     // 视口逻辑大小
var ROOM_W = VIEW_W, ROOM_H = VIEW_H; // 等距视角下房间=视口（无滚动）
var CAT_COLORS = ['#ff9944', '#ffcc66', '#aaaaaa', '#886644', '#ffddaa', '#dd8866'];

// ==================== 透视房间参数 ====================
// 透视房间结构（一点透视）
var BACK_L = 60, BACK_R = 690;    // 后墙左右x
var BACK_T = 75, BACK_B = 400;    // 后墙上下y
var FLOOR_B = 760;                 // 地板底边y（工具栏上方）
var ITEM_SCALE = 0.6;              // 后墙装饰品基准缩放
// 透视缩放：远处（后墙）小、近处（前方）大 → 自然纵深感
function getItemScale(y) {
  var t = (y - BACK_B) / (FLOOR_B - BACK_B);
  t = Math.max(0, Math.min(1, t));
  return 0.55 + t * 0.30;         // 0.55（后墙）→ 0.85（最前方）
}

// ==================== 物品模板 ====================
// zone: 'wall'(y:60-700), 'floor'(y:800-1320), 'any'
var ITEM_TEMPLATES = [
  {
    id:'sofa', name:'沙发', w:260, h:110, zone:'floor',
    draw:function(ctx,x,y,w,h){
      DrawUtils.roundRect(ctx,x,y,w,h,12,'#8B6F47');
      DrawUtils.roundRect(ctx,x+8,y+8,w-16,h*0.55,8,'#A0845C');
      DrawUtils.roundRect(ctx,x+15,y+15,50,32,6,'#cc7755');
      DrawUtils.roundRect(ctx,x+72,y+15,50,32,6,'#5588aa');
      DrawUtils.roundRect(ctx,x+130,y+15,50,32,6,'#cc7755');
      DrawUtils.roundRect(ctx,x+188,y+15,50,32,6,'#77aa77');
    }
  },
  {
    id:'table', name:'茶几', w:150, h:70, zone:'floor',
    draw:function(ctx,x,y,w,h){
      DrawUtils.roundRect(ctx,x,y,w,h,6,'#A0522D');
      DrawUtils.roundRect(ctx,x+5,y+5,w-10,h-10,4,'#C4793A');
    }
  },
  {
    id:'tv', name:'电视', w:180, h:120, zone:'wall',
    draw:function(ctx,x,y,w,h){
      DrawUtils.roundRect(ctx,x,y,w,h,8,'#222');
      // 屏幕微闪烁（像在播放节目）
      var flk=Date.now()/1000;
      var br=Math.floor(51+Math.sin(flk*2.1)*8);
      var bg=Math.floor(68+Math.sin(flk*1.7)*6);
      var bb=Math.floor(85+Math.sin(flk*3.3)*5);
      DrawUtils.roundRect(ctx,x+8,y+8,w-16,h-30,4,'rgb('+br+','+bg+','+bb+')');
      // 屏幕高光流动
      var hlx=((flk*0.3)%1.0)*(w-24);
      ctx.fillStyle='rgba(150,200,255,'+(0.06+Math.sin(flk*1.5)*0.03)+')';
      ctx.fillRect(x+12,y+12,hlx,(h-38)*0.4);
      DrawUtils.roundRect(ctx,x+65,y+h-18,50,16,3,'#333');
    }
  },
  {
    id:'tv_stand', name:'电视柜', w:280, h:45, zone:'wall',
    draw:function(ctx,x,y,w,h){
      DrawUtils.roundRect(ctx,x,y,w,h,6,'#5c4a3a');
      DrawUtils.roundRect(ctx,x+5,y+3,80,h-6,3,'#4a3a2a');
      DrawUtils.roundRect(ctx,x+90,y+3,80,h-6,3,'#4a3a2a');
      DrawUtils.roundRect(ctx,x+175,y+3,100,h-6,3,'#4a3a2a');
    }
  },
  {
    id:'bookshelf', name:'书架', w:110, h:170, zone:'wall',
    draw:function(ctx,x,y,w,h){
      DrawUtils.roundRect(ctx,x,y,w,h,4,'#6b4226');
      ctx.fillStyle='#5a3520'; ctx.fillRect(x+4,y+h*0.33,w-8,4); ctx.fillRect(x+4,y+h*0.66,w-8,4);
      DrawUtils.roundRect(ctx,x+8,y+6,18,h*0.3-10,2,'#cc4444');
      DrawUtils.roundRect(ctx,x+28,y+8,15,h*0.3-12,2,'#4466cc');
      DrawUtils.roundRect(ctx,x+45,y+4,20,h*0.3-8,2,'#44aa44');
      DrawUtils.roundRect(ctx,x+68,y+10,16,h*0.3-14,2,'#cc8844');
      DrawUtils.roundRect(ctx,x+10,y+h*0.33+8,25,h*0.3-12,2,'#dd6666');
      DrawUtils.roundRect(ctx,x+38,y+h*0.33+10,18,h*0.3-14,2,'#6688dd');
      DrawUtils.roundRect(ctx,x+60,y+h*0.33+6,20,h*0.3-10,2,'#66bb66');
      ctx.beginPath(); ctx.arc(x+25,y+h*0.66+25,12,0,Math.PI*2); ctx.fillStyle='#ddd'; ctx.fill();
      DrawUtils.roundRect(ctx,x+55,y+h*0.66+10,30,35,3,'#aa8855');
    }
  },
  {
    id:'vase', name:'花瓶', w:40, h:70, zone:'any',
    draw:function(ctx,x,y,w,h){
      ctx.beginPath(); ctx.moveTo(x+w*0.3,y); ctx.quadraticCurveTo(x,y+h*0.6,x+w*0.15,y+h);
      ctx.lineTo(x+w*0.85,y+h); ctx.quadraticCurveTo(x+w,y+h*0.6,x+w*0.7,y);
      ctx.closePath(); ctx.fillStyle='#4488aa'; ctx.fill();
      DrawUtils.ellipse(ctx,x+w*0.5,y-10,12,8,'#ff6688');
      DrawUtils.ellipse(ctx,x+w*0.3,y-5,8,6,'#ff8866');
    }
  },
  {
    id:'candle', name:'蜡烛', w:30, h:60, zone:'any',
    draw:function(ctx,x,y,w,h){
      DrawUtils.ellipse(ctx,x+w/2,y+h-5,w*0.6,8,'#bb9944');
      DrawUtils.roundRect(ctx,x+w*0.25,y+h*0.2,w*0.5,h*0.75,3,'#ffffee');
      ctx.beginPath(); ctx.moveTo(x+w/2,y); ctx.quadraticCurveTo(x+w*0.7,y+h*0.12,x+w/2,y+h*0.2);
      ctx.quadraticCurveTo(x+w*0.3,y+h*0.12,x+w/2,y); ctx.fillStyle='#ffaa33'; ctx.fill();
    }
  },
  {
    id:'lamp', name:'台灯', w:50, h:90, zone:'any',
    draw:function(ctx,x,y,w,h){

// ==================== 布局系统（等距投影）====================
function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length-1; i > 0; i--) { var j = Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; }
  return a;

// 检测两个矩形是否重叠
function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return !(ax + aw <= bx || bx + bw <= ax || ay + ah <= by || by + bh <= ay);
}
// 检测候选位置是否与已放置物品重叠
function hasOverlap(ix, iy, sw, sh, placed) {
  for (var j = 0; j < placed.length; j++) {
    var p = placed[j];
    if (rectsOverlap(ix, iy, sw, sh, p.x, p.y, p.w, p.h)) return true;
  }
  return false;
}

function placeItems(templates, existing) {
  var placed = existing ? existing.slice() : [];
  var result = [];
  var roomId = ROOMS[game.currentRoomIdx].id;
  var layout = ROOM_LAYOUTS[roomId] || {};
  var extras = ROOM_LAYOUTS[roomId + '_extra'] || [];

  for (var i = 0; i < templates.length; i++) {
    var tmpl = templates[i];

    // 构建候选位置列表：布局位置 → 备用位置 → 随机位置
    var candidates = [];

    // 1. 固定布局位置
    var pos = layout[tmpl.id];
    if (pos) {
      candidates.push({
        bx: pos.x + (Math.random() - 0.5) * 12,
        by: pos.y + (Math.random() - 0.5) * 8,
        dp: pos.depth || pos.y
      });
    }

    // 2. 备用位置（打乱顺序避免总是用同一个）
    var shuffledExtras = extras.slice();
    for (var si = shuffledExtras.length - 1; si > 0; si--) {
      var sj = Math.floor(Math.random() * (si + 1));
      var tmp = shuffledExtras[si]; shuffledExtras[si] = shuffledExtras[sj]; shuffledExtras[sj] = tmp;
    }
    for (var ei = 0; ei < shuffledExtras.length; ei++) {
      candidates.push({
        bx: shuffledExtras[ei].x + (Math.random() - 0.5) * 20,
        by: shuffledExtras[ei].y + (Math.random() - 0.5) * 15,
        dp: shuffledExtras[ei].y
      });
    }

    // 3. 随机后备
    for (var ri = 0; ri < 8; ri++) {
      var rbx = 100 + Math.random() * 550;
      var rby = BACK_B + 60 + Math.random() * 240;
      candidates.push({ bx: rbx, by: rby, dp: rby });
    }

    // 逐个尝试，选第一个不重叠的位置
    var chosen = null;
    for (var ci = 0; ci < candidates.length; ci++) {
      var c = candidates[ci];
      var scale = (tmpl.zone === 'wall_decor') ? ITEM_SCALE : getItemScale(c.by);
      var sw = tmpl.w * scale;
      var sh = tmpl.h * scale;
      var ix = c.bx - sw / 2;
      var iy = c.by - sh;
      ix = Math.max(4, Math.min(VIEW_W - sw - 4, ix));
      iy = Math.max(4, Math.min(VIEW_H - sh - 4, iy));

      if (!hasOverlap(ix, iy, sw, sh, placed)) {
        chosen = { ix:ix, iy:iy, bx:ix+sw/2, by:iy+sh, sw:sw, sh:sh, dp:c.dp, scale:scale };
        break;
      }
    }

    // 全部重叠时兜底：用第一个候选位置
    if (!chosen) {
      var c = candidates[0];
      var scale = (tmpl.zone === 'wall_decor') ? ITEM_SCALE : getItemScale(c.by);
      var sw = tmpl.w * scale;
      var sh = tmpl.h * scale;
      var ix = Math.max(4, Math.min(VIEW_W - sw - 4, c.bx - sw/2));
      var iy = Math.max(4, Math.min(VIEW_H - sh - 4, c.by - sh));
      chosen = { ix:ix, iy:iy, bx:ix+sw/2, by:iy+sh, sw:sw, sh:sh, dp:c.dp, scale:scale };
    }

    var item = {
      id:tmpl.id, name:tmpl.name, zone:tmpl.zone, draw:tmpl.draw,
      origW:tmpl.w, origH:tmpl.h, scale:chosen.scale,
      x:chosen.ix, y:chosen.iy, w:chosen.sw, h:chosen.sh,
      baseX:chosen.bx, baseY:chosen.by, depth:chosen.dp
    };
    placed.push(item);
    result.push(item);
  }
  return result;
}

function loadAchievements() {
  try {
    var data = localStorage.getItem('catHideAchieve');
    if (data) {
      var parsed = JSON.parse(data);
      game.achievements = parsed.unlocked || {};
      game.totalCatsFound = parsed.totalCats || 0;
    }
  } catch(e) {}
}

function saveAchievements() {
  try {
    localStorage.setItem('catHideAchieve', JSON.stringify({
      unlocked: game.achievements,
      totalCats: game.totalCatsFound,
    }));
  } catch(e) {}
}

function unlockAchievement(id) {
  if (game.achievements[id]) return;
  game.achievements[id] = true;
  saveAchievements();
  for (var i = 0; i < ACHIEVEMENTS.length; i++) {
    if (ACHIEVEMENTS[i].id === id) {
      game.achievePopup = { name: ACHIEVEMENTS[i].name, icon: ACHIEVEMENTS[i].icon, timer: 3.0 };
      SFX.achieve();
      break;
    }
  }
}

  if (game.mistakes === 0) unlockAchievement('perfect');
  if (game.playTime <= 60) unlockAchievement('speed_run');
  if (game._usedLaser && game._usedCatnip) unlockAchievement('tool_user');
  if (!game._hintTriggered) unlockAchievement('no_hint');
  var allClear = true;
  for (var i = 0; i < ROOMS.length; i++) {
    var rp = levelProgress[ROOMS[i].id];
    if (!rp || rp.stars < 1) { allClear = false; break; }
  }
  if (allClear) unlockAchievement('all_clear');
  var allStars = true;
  for (var j = 0; j < ROOMS.length; j++) {
    var rp2 = levelProgress[ROOMS[j].id];
    if (!rp2 || rp2.stars < 3) { allStars = false; break; }
  }
  if (allStars) unlockAchievement('all_stars');
}

function drawAchievePopup(ctx) {
  if (!game.achievePopup) return;
  var p = game.achievePopup;
  var slideIn = Math.min(1, (3.0 - p.timer) / 0.4);
  var slideOut = Math.min(1, p.timer / 0.4);
  var alpha = Math.min(slideIn, slideOut);
  var y = 60 + (1 - slideIn) * -50;

  ctx.save();
  ctx.globalAlpha = alpha;
  var boxW = 280, boxH = 50;
  var boxX = VIEW_W / 2 - boxW / 2;
  DrawUtils.roundRect(ctx, boxX, y, boxW, boxH, 16, 'rgba(50,40,20,0.92)');
  ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 1.5;
  DrawUtils.roundRect(ctx, boxX, y, boxW, boxH, 16, null, '#ffd700');

  ctx.font = '22px sans-serif'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(p.icon, boxX + 14, y + boxH / 2);

  ctx.font = 'bold 14px sans-serif'; ctx.fillStyle = '#ffd700';
  ctx.fillText('成就解锁!', boxX + 46, y + 17);
  ctx.font = '13px sans-serif'; ctx.fillStyle = '#eee';
  ctx.fillText(p.name, boxX + 46, y + 35);

  ctx.restore();
}

// ==================== 初始化 ====================
function initGame(roomIdx) {
  if (roomIdx !== undefined) game.currentRoomIdx = roomIdx;
  var room = ROOMS[game.currentRoomIdx];
  var mult = room.behaviorMult;

  game.state = 'intro';
  game.catCount = room.catCount;
  game.maxLives = room.lives;
  game.lives = room.lives; game.foundCount = 0; game.mistakes = 0;
  game.toast = ''; game.toastTimer = 0;
  game.animTimer = 0; game.currentFoundCat = null;
  game.wrongItem = null; game.shakeTimer = 0;
  game.introTimer = 5.0;
  game.fakeWobbles = [];
  var fwi = room.fakeWobbleInterval || [8, 20];
  game.fakeWobbleTimer = fwi[0] + Math.random() * (fwi[1] - fwi[0]);
  game.activeTool = null; game.retryBtn = null; game.nextLevelBtn = null; game.selectBtn = null; game.shareBtn = null;
  game.laserCooldown = 0; game.laserActive = false; game.laserTimer = 0;
  game.catnipCooldown = 0; game.catnipActive = false; game.catnipTimer = 0;
  game.playTime = 0;
  game.hintTimer = 0; game.hintCat = null; game.hintAlpha = 0;
  game._lastFoundTime = 0;
  game.particles = [];
  game.envEvent = null;
  game.envEventCooldown = 10 + Math.random() * 8; // 开局后10-18秒第一个事件
  game.alertness = 0;
  game.alertnessMax = ALERTNESS_RULES.max;
  game.alertDecayRate = ALERTNESS_RULES.decayRate;
  game.alertTier = 'calm';
  game.steamObscureTimer = 0;
  game.steamTouchPenalty = false;
  game.steamTapCooldown = 0;
  game._usedLaser = false;
  game._usedCatnip = false;
  game._hintTriggered = false;
  game.achievePopup = null;
  game.combo = 0; game.maxCombo = 0; game.comboTimer = 0; game.comboPopup = null;
  game.paused = false;
  game.screenFlash = 0;
  game.timeOfDay = ['morning', 'afternoon', 'evening', 'night'][Math.floor(Math.random() * 4)];

  // 启动环境音效
  AmbientSound.startAmbient(room.id);

  // 随机放置当前房间的物品
  var roomItems = placeItems(room.items);

  // 随机选猫伪装模板
  var disguises = shuffle(room.disguises).slice(0, game.catCount);
  var occupied = roomItems.map(function(it){ return {x:it.x,y:it.y,w:it.w,h:it.h}; });
  var usedQuotes = [];
  game.cats = [];

  for (var i = 0; i < disguises.length; i++) {
    var tmpl = disguises[i];
    var catPlaced = placeItems([tmpl], occupied);
    var cp = catPlaced[0];
    occupied.push({x:cp.x,y:cp.y,w:cp.w,h:cp.h});
    // 分配性格（每只猫不同性格）
    var personality = CAT_PERSONALITIES[i % CAT_PERSONALITIES.length];
    game.cats.push({
      id: 'cat_'+i,
      x: cp.x, y: cp.y, w: cp.w, h: cp.h,
      origW: cp.origW, origH: cp.origH, scale: cp.scale,
      baseX: cp.baseX, baseY: cp.baseY, depth: cp.depth,
      drawFn: cp.draw, name: cp.name, disguiseId: tmpl.id,
      quote: pickQuote(usedQuotes, room.id),
      color: personality.color,
      personality: personality,
      found: false, foundAnim: 0,
      behaviorMult: mult,
      // 晃动（cooldown 乘以难度系数，越高等越久；幅度乘以 wobbleStrengthMult）
      wobbleTimer: randRange(personality.wobbleCooldown) * mult,
      wobbleActive: false, wobbleElapsed: 0,
      wobbleDuration: randRange(personality.wobbleDuration),
      wobbleCooldown: personality.wobbleCooldown,
      wobbleStrength: personality.wobbleStrength * (room.wobbleStrengthMult || 1),
      // 尾巴
      tailTimer: randRange(personality.tailCooldown) * mult,
      tailActive: false, tailElapsed: 0,
      tailDuration: randRange(personality.tailDuration),
      // 气泡
      bubbleTimer: randRange(personality.bubbleCooldown) * mult,
      bubbleActive: false, bubbleElapsed: 0,
      bubbleDuration: randRange(personality.bubbleDuration),
      bubbleText: '',
      // 眼睛偷看
      eyeTimer: randRange(personality.eyeCooldown) * mult,
      eyeActive: false, eyeElapsed: 0,
      eyeDuration: randRange(personality.eyeDuration),
    });
  }

  // 合并所有物品
  game.allItems = [];
  roomItems.forEach(function(it){
    game.allItems.push({ id:it.id, name:it.name, zone:it.zone, x:it.x, y:it.y, w:it.w, h:it.h,
      origW:it.origW, origH:it.origH, scale:it.scale,
      baseX:it.baseX, baseY:it.baseY, depth:it.depth,
      drawFn:it.draw, isCat:false });
  });
  game.cats.forEach(function(cat){
    game.allItems.push({ id:cat.id, name:cat.name, zone:'floor', x:cat.x, y:cat.y, w:cat.w, h:cat.h,
      origW:cat.origW, origH:cat.origH, scale:cat.scale,
      baseX:cat.baseX, baseY:cat.baseY, depth:cat.depth,
      drawFn:cat.drawFn, isCat:true, catRef:cat });
  });

  // 等距视角：房间=视口，无需相机偏移
  game.camX = 0;
  game.camY = 0;

  // 新手引导：第一次玩第一关时触发
  game.tutorial = null;
  if (game.currentRoomIdx === 0 && !hasTutorialDone()) {
    game.tutorial = { step: 0, timer: 0, tapTarget: null, skipBtn: null };
  }

  // Patch inits
  initRelocateCats();
  initBuddyCats();
  initFeatherState();
  initExpressions();

  game.lastTime = Date.now();
}

function hasTutorialDone() {
  try { return !!localStorage.getItem('catHideTutorial'); } catch(e) { return false; }
}
function saveTutorialDone() {
  try { localStorage.setItem('catHideTutorial', '1'); } catch(e) {}
}

// 狡猾猫制造假穿帮
function updateFakeWobbles(dt) {
  // 更新现有假晃动
  for (var i = game.fakeWobbles.length - 1; i >= 0; i--) {
    game.fakeWobbles[i].elapsed += dt;
    if (game.fakeWobbles[i].elapsed >= game.fakeWobbles[i].duration) {
      game.fakeWobbles.splice(i, 1);
    }
  }
  // 狡猾猫触发新假穿帮
  var alertRatio = getAlertnessRatio();
  game.fakeWobbleTimer -= dt * (1 + alertRatio * ALERTNESS_RULES.fakeWobbleBoost);
  if (game.fakeWobbleTimer <= 0) {
    var fwi2 = ROOMS[game.currentRoomIdx].fakeWobbleInterval || [8, 20];
    game.fakeWobbleTimer = fwi2[0] + Math.random() * (fwi2[1] - fwi2[0]);
    // 找到有 fakeWobble 能力且未被发现的猫
    var sneakyCats = game.cats.filter(function(c){ return !c.found && c.personality.fakeWobble; });
    if (sneakyCats.length > 0) {
      // 找一个距离狡猾猫较近的普通物品
      var sc = sneakyCats[Math.floor(Math.random()*sneakyCats.length)];
      var nearItems = game.allItems.filter(function(it){
        if (it.isCat) return false;
        var dx = (it.x+it.w/2)-(sc.x+sc.w/2), dy = (it.y+it.h/2)-(sc.y+sc.h/2);
        return Math.sqrt(dx*dx+dy*dy) < 320;
      });
      if (nearItems.length > 0) {
        var target = nearItems[Math.floor(Math.random()*nearItems.length)];
        game.fakeWobbles.push({ itemId: target.id, elapsed: 0, duration: 0.3 + Math.random()*0.3 });
      }
    }
  }
}

function getFakeWobble(itemId) {
  for (var i = 0; i < game.fakeWobbles.length; i++) {
    if (game.fakeWobbles[i].itemId === itemId) return game.fakeWobbles[i];
  }
  return null;
}

function pickEnvEventSourceItem(roomId, evtType) {
  var preferredIds = null;
  if (evtType === 'steam') {
    if (roomId === 'kitchen') preferredIds = ['stove', 'pot', 'pan', 'kettle'];
    else if (roomId === 'bathroom') preferredIds = ['shower', 'bathtub', 'sink_bath'];
  } else if (evtType === 'drip') {
    if (roomId === 'kitchen') preferredIds = ['k_sink'];
    else if (roomId === 'bathroom') preferredIds = ['sink_bath', 'shower'];
  }

  if (preferredIds && preferredIds.length > 0) {
    var preferredItems = game.allItems.filter(function(item) {
      return preferredIds.indexOf(item.id) !== -1;
    });
    if (preferredItems.length > 0) {
      return preferredItems[Math.floor(Math.random() * preferredItems.length)];
    }
  }

  return game.allItems[Math.floor(Math.random() * game.allItems.length)];
}

function getAlertnessRatio() {
  return Math.max(0, Math.min(1, game.alertness / Math.max(1, game.alertnessMax)));
}

function isSteamObscuring() {
  return game.steamObscureTimer > 0;
}

function pointInSteam(vx, vy) {
  if (!game.envEvent || game.envEvent.type !== 'steam') return false;
  var e = game.envEvent;
  var p = 1 - e.timer / e.duration;
  var centerY = e.y - 18 - p * 18;
  var width = 62;
  var height = 96;
  return vx >= e.x - width / 2 && vx <= e.x + width / 2 &&
    vy >= centerY - height / 2 && vy <= centerY + height / 2;
}

function addAlertness(amount) {
  if (!amount) return;
  game.alertness = Math.max(0, Math.min(game.alertnessMax, game.alertness + amount));
}

function updateAlertness(dt) {
  var room = ROOMS[game.currentRoomIdx] || {};
  var decay = game.alertDecayRate;

  if (game.state !== 'playing') return;
  if (game.tutorial) return;

  if (game.alertness > 0) {
    if (game.activeTool) decay *= 0.5;
    if (game.envEvent) decay *= 0.75;
    if (game.combo >= 2) decay *= 1.2;
    if (room.alertDecayMult) decay *= room.alertDecayMult;
    game.alertness = Math.max(0, game.alertness - decay * dt);
  }

  if (game.steamObscureTimer > 0) {
    game.steamObscureTimer -= dt;
    if (game.steamObscureTimer <= 0) {
      game.steamObscureTimer = 0;
      game.steamTouchPenalty = false;
    }
  }
  if (game.steamTapCooldown > 0) {
    game.steamTapCooldown -= dt;
    if (game.steamTapCooldown < 0) game.steamTapCooldown = 0;
  }

  var ratio = getAlertnessRatio();
  var nextTier = 'calm';
  if (ratio >= ALERTNESS_RULES.dangerThreshold) nextTier = 'danger';
  else if (ratio >= ALERTNESS_RULES.watchThreshold) nextTier = 'watch';

  if (nextTier !== game.alertTier) {
    game.alertTier = nextTier;
    if (game.state === 'playing') {
      if (nextTier === 'watch') {
        game.toast = '猫咪开始警觉了，动作会变少';
        game.toastTimer = 1.2;
      } else if (nextTier === 'danger') {
        game.toast = '警觉拉满！猫咪正在收敛动作';
        game.toastTimer = 1.5;
      } else if (nextTier === 'calm' && ratio <= 0.1) {
        game.toast = '房间恢复平静，猫咪放松了';
        game.toastTimer = 1.0;
      }
    }
  }
}

// ==================== 更新逻辑 ====================
function update() {
  var now = Date.now();
  if (game.paused) { game.lastTime = now; return; }
  if (game.state === 'ready') { game.lastTime = now; return; }
  var dt = Math.min((now - game.lastTime)/1000, 0.1);
  game.lastTime = now;

  // 开场提示
  if (game.state === 'intro') {
    var prevSec = Math.ceil(game.introTimer);
    game.introTimer -= dt;
    var curSec = Math.ceil(game.introTimer);
    if (curSec !== prevSec && curSec > 0 && curSec <= 3) SFX.tick();
    if (game.introTimer <= -0.5) {
      game.state = 'playing';
      var rm = ROOMS[game.currentRoomIdx];
      game.toast = rm.emoji + ' ' + rm.name + ' — 找出' + rm.catCount + '只猫!'; game.toastTimer = 2.5;
    }
  }

  // 猫穿帮行为更新
  if (game.state === 'playing' || game.state === 'intro') {
    var alertRatio = getAlertnessRatio();
    var revealRate = 1 - alertRatio * ALERTNESS_RULES.revealReduction;
    var visibleDurationScale = 1 - alertRatio * ALERTNESS_RULES.durationReduction;
    game.cats.forEach(function(cat) {
      if (cat.found) return;
      var p = cat.personality;
      // 晃动
      if (!cat.wobbleActive) {
        cat.wobbleTimer -= dt * revealRate;
        if (cat.wobbleTimer <= 0) { cat.wobbleActive = true; cat.wobbleElapsed = 0; cat.wobbleDuration = Math.max(0.18, randRange(p.wobbleDuration) * visibleDurationScale); }
      } else {
        cat.wobbleElapsed += dt;
        if (cat.wobbleElapsed >= cat.wobbleDuration) { cat.wobbleActive = false; cat.wobbleTimer = randRange(p.wobbleCooldown) * cat.behaviorMult / Math.max(0.3, revealRate); }
      }
      // 尾巴
      if (!cat.tailActive) {
        cat.tailTimer -= dt;
        if (cat.tailTimer <= 0) { cat.tailActive = true; cat.tailElapsed = 0; cat.tailDuration = randRange(p.tailDuration); }
      } else {
        cat.tailElapsed += dt;
        if (cat.tailElapsed >= cat.tailDuration) { cat.tailActive = false; cat.tailTimer = randRange(p.tailCooldown) * cat.behaviorMult; }
      }
      // 气泡
      if (!cat.bubbleActive) {
        cat.bubbleTimer -= dt * revealRate;
        if (cat.bubbleTimer <= 0) {
          cat.bubbleActive = true; cat.bubbleElapsed = 0;
          cat.bubbleDuration = Math.max(0.4, randRange(p.bubbleDuration) * visibleDurationScale);
          cat.bubbleText = getBubbleText(p, ROOMS[game.currentRoomIdx].id);
        }
      } else {
        cat.bubbleElapsed += dt;
        if (cat.bubbleElapsed >= cat.bubbleDuration) { cat.bubbleActive = false; cat.bubbleTimer = randRange(p.bubbleCooldown) * cat.behaviorMult / Math.max(0.3, revealRate); }
      }
      // 眼睛偷看
      if (!cat.eyeActive) {
        cat.eyeTimer -= dt * revealRate;
        if (cat.eyeTimer <= 0) { cat.eyeActive = true; cat.eyeElapsed = 0; cat.eyeDuration = Math.max(0.2, randRange(p.eyeDuration) * visibleDurationScale); }
      } else {
        cat.eyeElapsed += dt;
        if (cat.eyeElapsed >= cat.eyeDuration) { cat.eyeActive = false; cat.eyeTimer = randRange(p.eyeCooldown) * cat.behaviorMult / Math.max(0.3, revealRate); }
      }
    });
    // 狡猾猫的假穿帮：让附近的普通物品偶尔也晃一下
    updateFakeWobbles(dt);
    // 随机环境事件
    updateEnvEvent(dt);
  }

  // 新手引导
  if (game.tutorial && game.state === 'playing') {
    updateTutorial(dt);
  }

  // 找到猫动画
  if (game.state === 'found_anim') {
    game.animTimer -= dt;
    if (game.currentFoundCat) game.currentFoundCat.foundAnim = Math.min(1, 1 - game.animTimer/2.0);
    if (game.animTimer <= 0) {
      if (game.currentFoundCat) game.currentFoundCat.foundAnim = 1;
      game.currentFoundCat = null;
      if (game.foundCount >= game.cats.length) {
        // 进入胜利过渡动画
        game.state = 'win_trans';
        game.transTimer = 1.5;
        SFX.win();
      } else {
        game.state = 'playing';
      }
    }
  }

  // 点错动画
  if (game.state === 'wrong_anim') {
    game.wrongAnimTimer -= dt;
    if (game.wrongAnimTimer <= 0) {
      game.wrongItem = null;
      if (game.lives <= 0) {
        game.state = 'lose_trans';
        game.transTimer = 1.0;
        SFX.lose();
      } else {
        game.state = 'playing';
      }
    }
  }

  // 胜利过渡动画
  if (game.state === 'win_trans') {
    game.transTimer -= dt;
    if (game.transTimer <= 0) {
      game.state = 'win';
      AmbientSound.stopAmbient();
      // 保存进度
      var stars = calcStars();
      var pid = ROOMS[game.currentRoomIdx].id;
      if (stars > levelProgress[pid].stars) levelProgress[pid].stars = stars;
      if (game.currentRoomIdx < ROOMS.length - 1) {
        levelProgress[ROOMS[game.currentRoomIdx + 1].id].unlocked = true;
      }
      saveProgress();
      checkWinAchievements(stars);
    }
  }

  // 失败过渡动画
  if (game.state === 'lose_trans') {
    game.transTimer -= dt;
    if (game.transTimer <= 0) {
      game.state = 'lose';
      AmbientSound.stopAmbient();
    }
  }

  // 工具冷却
  if (game.laserCooldown > 0) game.laserCooldown -= dt;
  if (game.catnipCooldown > 0) game.catnipCooldown -= dt;

  // 激光笔效果
  if (game.laserActive) {
    game.laserTimer -= dt;
    // 激光点缓动到目标
    game.laserX += (game.laserTargetX - game.laserX) * 0.15;
    game.laserY += (game.laserTargetY - game.laserY) * 0.15;
    // 检查范围内的猫 → 强制触发眼睛+晃动
    game.cats.forEach(function(cat) {
      if (cat.found) return;
      var dx = (cat.x+cat.w/2) - game.laserX, dy = (cat.y+cat.h/2) - game.laserY;
      if (Math.sqrt(dx*dx+dy*dy) < 160) {
        cat.eyeActive = true; cat.eyeElapsed = 0; cat.eyeDuration = 1.5;
        if (!cat.wobbleActive) { cat.wobbleActive = true; cat.wobbleElapsed = 0; cat.wobbleDuration = 0.8; }
      }
    });
    if (game.laserTimer <= 0) { game.laserActive = false; game.activeTool = null; }
  }

  // 猫薄荷效果
  if (game.catnipActive) {
    game.catnipTimer -= dt;
    game.cats.forEach(function(cat) {
      if (cat.found) return;
      var dx = (cat.x+cat.w/2) - game.catnipX, dy = (cat.y+cat.h/2) - game.catnipY;
      if (Math.sqrt(dx*dx+dy*dy) < game.catnipRadius) {
        // 强制穿帮：晃动+尾巴+气泡
        if (!cat.wobbleActive) { cat.wobbleActive = true; cat.wobbleElapsed = 0; cat.wobbleDuration = randRange([0.5, 1.0]); }
        if (!cat.tailActive) { cat.tailActive = true; cat.tailElapsed = 0; cat.tailDuration = randRange([1.0, 2.0]); }
        if (!cat.bubbleActive) {
          cat.bubbleActive = true; cat.bubbleElapsed = 0; cat.bubbleDuration = 2.0;
          cat.bubbleText = ['好香...', '这是什么!', '忍不住了...', '喵~!'][Math.floor(Math.random()*4)];
        }
      }
    });
    if (game.catnipTimer <= 0) { game.catnipActive = false; game.activeTool = null; }
  }

  // Patch updates
  updateRelocateCats(dt);
  updateBuddyAlert(dt);
  updateFeatherEffect(dt);
  updateExpressions(dt);
  updateAlertness(dt);

  // 震动
  if (game.shakeTimer > 0) {
    game.shakeTimer -= dt;
    game.shakeX = (Math.random()-0.5) * 8;
    game.shakeY = (Math.random()-0.5) * 8;
    if (game.shakeTimer <= 0) { game.shakeX = 0; game.shakeY = 0; }
  }

  // 计时器
  if (game.state === 'playing') {
    game.playTime += dt;
  }

  // 连击倒计时
  if (game.comboTimer > 0) {
    game.comboTimer -= dt;
    if (game.comboTimer <= 0) { game.combo = 0; game.comboTimer = 0; }
  }
  // 连击弹出动画
  if (game.comboPopup) {
    game.comboPopup.timer -= dt;
    if (game.comboPopup.timer <= 0) game.comboPopup = null;
  }

  // 提示系统：一定时间没找到猫，给出微光提示（hintDelay 按关卡递增）
  if (game.state === 'playing') {
    var hintDelay = ROOMS[game.currentRoomIdx].hintDelay || 15;
    game._lastFoundTime += dt;
    if (game._lastFoundTime >= hintDelay) {
      var unfound = game.cats.filter(function(c){ return !c.found; });
      if (unfound.length > 0) {
        game.hintCat = unfound[Math.floor(Math.random() * unfound.length)];
        game.hintTimer = 2.0;
        game.hintAlpha = 0;
        game._lastFoundTime = 0;
        game._hintTriggered = true;
      }
    }
    if (game.hintTimer > 0) {
      game.hintTimer -= dt;
      if (game.hintTimer > 1.5) game.hintAlpha = (2.0 - game.hintTimer) / 0.5;
      else if (game.hintTimer < 0.5) game.hintAlpha = game.hintTimer / 0.5;
      else game.hintAlpha = 1;
      if (game.hintTimer <= 0) { game.hintCat = null; game.hintAlpha = 0; }
    }
  }

  // screenFlash decay
  if (game.screenFlash > 0) { game.screenFlash -= dt; if (game.screenFlash < 0) game.screenFlash = 0; }

  // 粒子更新
  for (var pi = game.particles.length - 1; pi >= 0; pi--) {
    var p = game.particles[pi];
    p.life -= dt;
    if (p.life <= 0) { game.particles.splice(pi, 1); continue; }
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 80 * dt;
    p.alpha = Math.min(1, p.life / p.maxLife * 2);
    if (p.rot !== undefined && p.rotSpeed) p.rot += p.rotSpeed * dt;
    if (p.type === 'ring' && p.growSpeed) p.radius += p.growSpeed * dt;
  }

  // Toast
  if (game.toastTimer > 0) { game.toastTimer -= dt; if (game.toastTimer <= 0) game.toast = ''; }

  // 成就弹窗计时
  if (game.achievePopup) {
    game.achievePopup.timer -= dt;
    if (game.achievePopup.timer <= 0) game.achievePopup = null;
  }
}

  ],

  ],
  bedroom: [
    { type:'flicker', name:'灯光闪烁', duration:1.0 },
    { type:'shadow',  name:'窗外影子', duration:1.5 },

  ],

};

function updateEnvEvent(dt) {
  // 正在播放事件
  if (game.envEvent) {
    game.envEvent.timer -= dt;
    if (game.envEvent.timer <= 0) {
      game.envEvent = null;
      game.envEventCooldown = 8 + Math.random() * 12; // 下次事件间隔
    }
    return;
  }
  // 冷却中
  var room = ROOMS[game.currentRoomIdx] || {};
  var alertRatio = getAlertnessRatio();
  game.envEventCooldown -= dt * (1 + alertRatio * ALERTNESS_RULES.envBoost);
  if (game.envEventCooldown > 0) return;
  // 触发新事件
  var roomId = ROOMS[game.currentRoomIdx].id;
  var pool = ENV_EVENTS[roomId] || ENV_EVENTS.livingroom;
  var evt = null;
  if ((roomId === 'kitchen' || roomId === 'bathroom') && alertRatio >= 0.55) {
    var steamPool = pool.filter(function(entry) { return entry.type === 'steam'; });
    var steamBias = room.steamAlertBonus || 1;
    if (steamPool.length > 0 && Math.random() < Math.min(1, alertRatio * steamBias)) {
      evt = steamPool[Math.floor(Math.random() * steamPool.length)];
    }
  }
  if (!evt) evt = pool[Math.floor(Math.random() * pool.length)];
  // 选一个随机物品位置作为事件源
  var srcItem = pickEnvEventSourceItem(roomId, evt.type);
  game.envEvent = {
    type: evt.type, duration: evt.duration, timer: evt.duration,
    x: srcItem.baseX, y: srcItem.baseY - srcItem.h * 0.3,
  };
  if (evt.type === 'steam') {
    game.steamObscureTimer = evt.duration;
    game.steamTouchPenalty = true;
    if (roomId === 'kitchen') {
      game.toast = '蒸汽升起来了，先别急着乱点';
      game.toastTimer = 1.2;
    }
  }
}

function drawEnvEvent(ctx) {
  if (!game.envEvent) return;
  var e = game.envEvent;
  var p = 1 - e.timer / e.duration; // 0→1 进度
  // envDistraction 缩放干扰可见度
  var dist = ROOMS[game.currentRoomIdx] && ROOMS[game.currentRoomIdx].envDistraction;
  if (dist !== undefined && dist < 1) { ctx.save(); ctx.globalAlpha *= dist; }

  if (e.type === 'flicker') {
    // 全屏灯光闪烁
    var flk = Math.sin(p * Math.PI * 8);
    if (flk > 0.3) {
      ctx.save(); ctx.globalAlpha = flk * 0.12;
      ctx.fillStyle = '#000'; ctx.fillRect(0, 0, VIEW_W, VIEW_H);
      ctx.restore();
    }
  } else if (e.type === 'drip') {
    // 水滴动画
    var dropY = e.y + p * 50;
    var alpha = p < 0.8 ? 0.6 : (1 - p) * 3;
    ctx.save(); ctx.globalAlpha = alpha;
    ctx.fillStyle = '#88ccff';
    ctx.beginPath(); ctx.arc(e.x, dropY, 3 - p * 1.5, 0, Math.PI*2); ctx.fill();
    // 水波纹（落地后）
    if (p > 0.7) {
      var rippleP = (p - 0.7) / 0.3;
      ctx.globalAlpha = (1 - rippleP) * 0.3;
      ctx.strokeStyle = '#88ccff'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.ellipse(e.x, e.y + 50, rippleP * 12, rippleP * 4, 0, 0, Math.PI*2); ctx.stroke();
    }
    ctx.restore();
  } else if (e.type === 'steam') {
    // 蒸汽上升
    ctx.save();
    ctx.globalAlpha = isSteamObscuring() ? 1 : 0.7;
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.beginPath();
    ctx.ellipse(e.x, e.y - 28, 42, 56, 0, 0, Math.PI * 2);
    ctx.fill();
    for (var si = 0; si < 3; si++) {
      var sp = (p + si * 0.15) % 1;
      var sx = e.x + Math.sin(sp * 6 + si) * 8;
      var sy = e.y - sp * 40;
      ctx.globalAlpha = (1 - sp) * 0.2;
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(sx, sy, 4 + sp * 6, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  } else if (e.type === 'shadow') {
    // 窗外掠过的影子
    var shadowX = BACK_L + p * (BACK_R - BACK_L) * 1.2 - 30;
    ctx.save();
    ctx.globalAlpha = 0.06 * Math.sin(p * Math.PI);
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(shadowX, BACK_T + (BACK_B - BACK_T) * 0.3, 25, 45, 0.2, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  } else if (e.type === 'creak') {
    // 咯吱声 — 物品位置微颤线条
    var crP = Math.sin(p * Math.PI);
    ctx.save(); ctx.globalAlpha = crP * 0.4;
    ctx.strokeStyle = '#aaa'; ctx.lineWidth = 1;
    for (var ci = 0; ci < 3; ci++) {
      var cr = 8 + ci * 5;
      ctx.beginPath();
      ctx.arc(e.x, e.y, cr * crP, -0.3 + ci * 0.2, 0.3 + ci * 0.2);
      ctx.stroke();
    }
    ctx.restore();
  }
  // 关闭 envDistraction 的 save
  var dist2 = ROOMS[game.currentRoomIdx] && ROOMS[game.currentRoomIdx].envDistraction;
  if (dist2 !== undefined && dist2 < 1) { ctx.restore(); }
}

// ==================== 光照系统 ====================
function getWindowSkyColor(timeOfDay) {
  switch (timeOfDay) {
    case 'morning': return '#88bbdd';
    case 'afternoon': return '#6699cc';
    case 'evening': return ['#ff8844', '#6644aa'];
    case 'night': return '#1a1a3a';
    default: return '#6699cc';
  }
}

function drawTimeOfDayOverlay(ctx) {
  var tod = game.timeOfDay;
  if (!tod) return;
  ctx.save();
  // 1. Full-viewport colour tint
  var tint;
  switch (tod) {
    case 'morning': tint = 'rgba(255,220,150,0.06)'; break;
    case 'afternoon': tint = 'rgba(255,255,240,0.02)'; break;
    case 'evening': tint = 'rgba(255,160,80,0.10)'; break;
    case 'night': tint = 'rgba(40,60,120,0.12)'; break;
    default: tint = 'rgba(0,0,0,0)';
  }
  ctx.fillStyle = tint; ctx.fillRect(0, 0, VIEW_W, VIEW_H);
  // 2. Window glow / god-rays
  var winCX = (BACK_L + BACK_R) / 2, winCY = BACK_T + (BACK_B - BACK_T) * 0.3;
  var winW = (BACK_R - BACK_L) * 0.30, winH = (BACK_B - BACK_T) * 0.35;
  if (tod === 'morning') {
    ctx.save(); ctx.globalAlpha = 0.04;
    var rayGrad = ctx.createLinearGradient(winCX - winW/2, winCY, VIEW_W * 0.8, VIEW_H * 0.7);
    rayGrad.addColorStop(0, 'rgba(255,240,180,0.9)'); rayGrad.addColorStop(0.5, 'rgba(255,240,180,0.3)'); rayGrad.addColorStop(1, 'rgba(255,240,180,0)');
    ctx.fillStyle = rayGrad; ctx.beginPath();
    ctx.moveTo(winCX - winW*0.4, winCY - winH*0.4); ctx.lineTo(VIEW_W*0.9, VIEW_H*0.3);
    ctx.lineTo(VIEW_W*0.95, VIEW_H*0.85); ctx.lineTo(winCX - winW*0.4, winCY + winH*0.4);
    ctx.closePath(); ctx.fill(); ctx.restore();
  }
  if (tod === 'afternoon') {
    ctx.save(); ctx.globalAlpha = 0.05;
    var glowRad = Math.max(winW, winH) * 1.2;
    var ag = ctx.createRadialGradient(winCX, winCY, glowRad*0.15, winCX, winCY, glowRad);
    ag.addColorStop(0, 'rgba(255,255,230,0.7)'); ag.addColorStop(1, 'rgba(255,255,230,0)');
    ctx.fillStyle = ag; ctx.fillRect(winCX-glowRad, winCY-glowRad, glowRad*2, glowRad*2); ctx.restore();
  }
  if (tod === 'evening') {
    ctx.save(); ctx.globalAlpha = 0.07;
    var sunRad = Math.max(winW, winH) * 1.5;
    var sg = ctx.createRadialGradient(winCX, winCY, sunRad*0.1, winCX, winCY, sunRad);
    sg.addColorStop(0, 'rgba(255,140,60,0.8)'); sg.addColorStop(0.5, 'rgba(200,100,120,0.3)'); sg.addColorStop(1, 'rgba(100,70,170,0)');
    ctx.fillStyle = sg; ctx.fillRect(winCX-sunRad, winCY-sunRad, sunRad*2, sunRad*2); ctx.restore();
  }
  // 3. Ambient light spots (evening & night)
  if (tod === 'evening' || tod === 'night') {
    var ceilX = VIEW_W/2, ceilY = BACK_T + 20;
    var ceilR = (BACK_R - BACK_L) * 0.45;
    ctx.save(); ctx.globalAlpha = tod === 'night' ? 0.10 : 0.07;
    var cg = ctx.createRadialGradient(ceilX, ceilY, ceilR*0.05, ceilX, ceilY, ceilR);
    cg.addColorStop(0, 'rgba(255,230,170,0.9)'); cg.addColorStop(0.4, 'rgba(255,220,150,0.4)'); cg.addColorStop(1, 'rgba(255,210,130,0)');
    ctx.fillStyle = cg; ctx.fillRect(ceilX-ceilR, ceilY-ceilR*0.3, ceilR*2, ceilR*1.8); ctx.restore();
    var lampX = BACK_R - (BACK_R-BACK_L)*0.15, lampY = BACK_B + (VIEW_H-BACK_B)*0.35;
    var lampR = (BACK_R-BACK_L)*0.22;
    ctx.save(); ctx.globalAlpha = tod === 'night' ? 0.08 : 0.05;
    var lg = ctx.createRadialGradient(lampX, lampY, lampR*0.05, lampX, lampY, lampR);
    lg.addColorStop(0, 'rgba(255,215,140,0.8)'); lg.addColorStop(0.5, 'rgba(255,200,120,0.3)'); lg.addColorStop(1, 'rgba(255,190,100,0)');
    ctx.fillStyle = lg; ctx.beginPath(); ctx.arc(lampX, lampY, lampR, 0, Math.PI*2); ctx.fill(); ctx.restore();
  }
  // 4. Night vignette
  if (tod === 'night') {
    ctx.save(); ctx.globalAlpha = 0.06;
    var vigR = Math.max(VIEW_W, VIEW_H) * 0.75;
    var vg = ctx.createRadialGradient(VIEW_W/2, VIEW_H/2, vigR*0.45, VIEW_W/2, VIEW_H/2, vigR);
    vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(10,15,40,0.7)');
    ctx.fillStyle = vg; ctx.fillRect(0, 0, VIEW_W, VIEW_H); ctx.restore();
  }
  ctx.restore();
}

// ==================== 渲染 ====================
function drawRoomBackground(ctx) {
  var bgType = ROOMS[game.currentRoomIdx].bgType;
  if (bgType === 'kitchen') return drawKitchenBg(ctx);
  if (bgType === 'bedroom') return drawBedroomBg(ctx);
  if (bgType === 'bathroom') return drawBathroomBg(ctx);
  if (bgType === 'study') return drawStudyBg(ctx);
  return drawLivingroomBg(ctx);
}

// ---- 透视房间绘制（温馨风格） ----

function drawPerspectiveRoom(ctx, sideWall, backWall, floorColor, floorColor2, ceilingColor) {
  // 整体背景
  ctx.fillStyle = ceilingColor;
  ctx.fillRect(0, 0, VIEW_W, VIEW_H);

  // 地板（梯形）
  ctx.beginPath();
  ctx.moveTo(BACK_L, BACK_B); ctx.lineTo(BACK_R, BACK_B);
  ctx.lineTo(VIEW_W, FLOOR_B); ctx.lineTo(0, FLOOR_B);
  ctx.closePath();
  var fg = ctx.createLinearGradient(0, BACK_B, 0, FLOOR_B);
  fg.addColorStop(0, floorColor2); fg.addColorStop(1, floorColor);
  ctx.fillStyle = fg; ctx.fill();

  // 左墙（渐变增加纵深感）
  ctx.beginPath();
  ctx.moveTo(BACK_L, BACK_T); ctx.lineTo(0, 0);
  ctx.lineTo(0, FLOOR_B); ctx.lineTo(BACK_L, BACK_B);
  ctx.closePath();
  var lg = ctx.createLinearGradient(0, 0, BACK_L, 0);
  lg.addColorStop(0, sideWall); lg.addColorStop(1, backWall);
  ctx.fillStyle = lg; ctx.fill();

  // 右墙
  ctx.beginPath();
  ctx.moveTo(BACK_R, BACK_T); ctx.lineTo(VIEW_W, 0);
  ctx.lineTo(VIEW_W, FLOOR_B); ctx.lineTo(BACK_R, BACK_B);
  ctx.closePath();
  var rg = ctx.createLinearGradient(VIEW_W, 0, BACK_R, 0);
  rg.addColorStop(0, sideWall); rg.addColorStop(1, backWall);
  ctx.fillStyle = rg; ctx.fill();

  // 后墙
  ctx.fillStyle = backWall;
  ctx.fillRect(BACK_L, BACK_T, BACK_R - BACK_L, BACK_B - BACK_T);

  // 天花板
  ctx.beginPath();
  ctx.moveTo(BACK_L, BACK_T); ctx.lineTo(BACK_R, BACK_T);
  ctx.lineTo(VIEW_W, 0); ctx.lineTo(0, 0);
  ctx.closePath();
  ctx.fillStyle = ceilingColor; ctx.fill();

  // 柔和边线
  ctx.strokeStyle = 'rgba(0,0,0,0.12)'; ctx.lineWidth = 1.5;
  ctx.strokeRect(BACK_L, BACK_T, BACK_R - BACK_L, BACK_B - BACK_T);
  ctx.beginPath();
  ctx.moveTo(BACK_L, BACK_T); ctx.lineTo(0, 0);
  ctx.moveTo(BACK_R, BACK_T); ctx.lineTo(VIEW_W, 0);
  ctx.moveTo(BACK_L, BACK_B); ctx.lineTo(0, FLOOR_B);
  ctx.moveTo(BACK_R, BACK_B); ctx.lineTo(VIEW_W, FLOOR_B);
  ctx.stroke();
}

// 木地板纹理（透视收敛的木板条）
function drawWoodPlanks(ctx, dark, light, num) {
  ctx.save();
  // 纵向板条
  for (var i = 0; i <= num; i++) {
    var u = i / num;
    var topX = BACK_L + (BACK_R - BACK_L) * u;
    var botX = VIEW_W * u;
    ctx.strokeStyle = (i % 2 === 0) ? dark : light;
    ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.moveTo(topX, BACK_B); ctx.lineTo(botX, FLOOR_B); ctx.stroke();
  }
  // 横向接缝
  ctx.strokeStyle = dark; ctx.lineWidth = 0.3;
  for (var r = 1; r < 7; r++) {
    var t = r / 7;
    var y = BACK_B + (FLOOR_B - BACK_B) * t;
    var xl = BACK_L + (0 - BACK_L) * t;
    var xr = BACK_R + (VIEW_W - BACK_R) * t;
    ctx.beginPath(); ctx.moveTo(xl, y); ctx.lineTo(xr, y); ctx.stroke();
  }
  ctx.restore();
}

// 瓷砖地板网格
function drawFloorGrid(ctx, lineColor, rows, cols) {
  ctx.save();
  ctx.strokeStyle = lineColor; ctx.lineWidth = 0.5;
  for (var i = 1; i < rows; i++) {
    var t = i / rows;
    var y = BACK_B + (FLOOR_B - BACK_B) * t;
    var xl = BACK_L + (0 - BACK_L) * t;
    var xr = BACK_R + (VIEW_W - BACK_R) * t;
    ctx.beginPath(); ctx.moveTo(xl, y); ctx.lineTo(xr, y); ctx.stroke();
  }
  for (var j = 1; j < cols; j++) {
    var u = j / cols;
    ctx.beginPath();
    ctx.moveTo(BACK_L + (BACK_R - BACK_L) * u, BACK_B);
    ctx.lineTo(VIEW_W * u, FLOOR_B);
    ctx.stroke();
  }
  ctx.restore();
}

// 窗户（带窗帘 + 地板光斑）
function drawWindow(ctx, lPct, rPct, tPct, bPct, skyColor, isNight) {
  var wL = BACK_L + (BACK_R - BACK_L) * lPct;
  var wR = BACK_L + (BACK_R - BACK_L) * rPct;
  var wT = BACK_T + (BACK_B - BACK_T) * tPct;
  var wB = BACK_T + (BACK_B - BACK_T) * bPct;
  var wW = wR - wL, wH = wB - wT;

  // 窗框（深木色）
  ctx.fillStyle = '#5a4a3a';
  ctx.fillRect(wL - 4, wT - 4, wW + 8, wH + 8);
  // 天空
  ctx.fillStyle = skyColor;
  ctx.fillRect(wL, wT, wW, wH);
  // 飘动的云朵（裁剪到窗口内）
  ctx.save();
  ctx.beginPath(); ctx.rect(wL, wT, wW, wH); ctx.clip();
  if (!isNight) {
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    var ct1 = ((Date.now() / 18000) % 1.4) - 0.2;
    var cx1 = wL + ct1 * wW, cy1 = wT + wH * 0.25;
    ctx.beginPath(); ctx.arc(cx1,cy1,7,0,Math.PI*2); ctx.arc(cx1+9,cy1-3,5,0,Math.PI*2); ctx.arc(cx1+16,cy1,6,0,Math.PI*2); ctx.fill();
    var ct2 = ((Date.now() / 25000 + 0.5) % 1.4) - 0.2;
    var cx2 = wL + ct2 * wW, cy2 = wT + wH * 0.55;
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath(); ctx.arc(cx2,cy2,5,0,Math.PI*2); ctx.arc(cx2+8,cy2-2,4,0,Math.PI*2); ctx.fill();
  } else {
    // 夜空闪烁的星星
    ctx.fillStyle = 'rgba(255,255,220,0.4)';
    for (var si=0; si<5; si++) {
      var starX = wL + ((si*137+50) % wW);
      var starY = wT + ((si*89+20) % wH);
      var twinkle = 0.2 + Math.sin(Date.now()/600 + si*2) * 0.3;
      ctx.globalAlpha = twinkle;
      ctx.beginPath(); ctx.arc(starX, starY, 1.2, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
  ctx.restore();
  // 玻璃光泽
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.fillRect(wL, wT, wW * 0.4, wH);
  // 十字窗框
  ctx.strokeStyle = '#5a4a3a'; ctx.lineWidth = 3;
  var mx = (wL + wR) / 2, my = (wT + wB) / 2;
  ctx.beginPath(); ctx.moveTo(mx, wT); ctx.lineTo(mx, wB); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(wL, my); ctx.lineTo(wR, my); ctx.stroke();

  // 窗帘！温暖的布料质感
  var curtColor = isNight ? 'rgba(120,100,140,0.75)' : 'rgba(180,140,90,0.7)';
  var curtW = wW * 0.18;
  ctx.fillStyle = curtColor;
  // 左窗帘
  ctx.beginPath();
  ctx.moveTo(wL - 6, wT - 10);
  ctx.lineTo(wL + curtW, wT - 10);
  ctx.quadraticCurveTo(wL + curtW - 4, my, wL + curtW + 4, wB + 6);
  ctx.lineTo(wL - 6, wB + 6);
  ctx.closePath(); ctx.fill();
  // 右窗帘
  ctx.beginPath();
  ctx.moveTo(wR + 6, wT - 10);
  ctx.lineTo(wR - curtW, wT - 10);
  ctx.quadraticCurveTo(wR - curtW + 4, my, wR - curtW - 4, wB + 6);
  ctx.lineTo(wR + 6, wB + 6);
  ctx.closePath(); ctx.fill();
  // 窗帘褶皱
  ctx.strokeStyle = 'rgba(0,0,0,0.1)'; ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(wL + curtW * 0.5, wT); ctx.lineTo(wL + curtW * 0.5, wB + 4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(wR - curtW * 0.5, wT); ctx.lineTo(wR - curtW * 0.5, wB + 4); ctx.stroke();
  // 窗帘杆
  ctx.strokeStyle = '#6a5a4a'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(wL - 16, wT - 12); ctx.lineTo(wR + 16, wT - 12); ctx.stroke();
  // 杆头圆球
  ctx.fillStyle = '#6a5a4a';
  ctx.beginPath(); ctx.arc(wL - 16, wT - 12, 4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(wR + 16, wT - 12, 4, 0, Math.PI*2); ctx.fill();

  // 地板光斑（阳光/月光洒进来）
  ctx.save();
  ctx.globalAlpha = isNight ? 0.04 : 0.07;
  ctx.fillStyle = isNight ? '#aaaadd' : '#ffdd88';
  ctx.beginPath();
  ctx.moveTo(wL, BACK_B);
  ctx.lineTo(wR, BACK_B);
  ctx.lineTo(wR + (FLOOR_B - BACK_B) * 0.35, FLOOR_B - 50);
  ctx.lineTo(wL - (FLOOR_B - BACK_B) * 0.08, FLOOR_B - 50);
  ctx.closePath(); ctx.fill();
  ctx.restore();

  return {l:wL, r:wR, t:wT, b:wB};
}

// 吊灯（暖光光晕）
function drawCeilingLight(ctx) {
  var cx = (BACK_L + BACK_R) / 2, cy = BACK_T - 5;
  // 灯线
  ctx.strokeStyle = '#555'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(cx, BACK_T - 45); ctx.lineTo(cx, cy); ctx.stroke();
  // 灯罩
  ctx.fillStyle = '#e8d8b0';
  ctx.beginPath();
  ctx.moveTo(cx - 20, cy); ctx.lineTo(cx + 20, cy);
  ctx.lineTo(cx + 13, cy + 15); ctx.lineTo(cx - 13, cy + 15);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#c8b890'; ctx.lineWidth = 1; ctx.stroke();
  // 暖光光晕 — 温馨的关键！
  ctx.save();
  var glow = ctx.createRadialGradient(cx, cy + 12, 4, cx, cy + 12, 140);
  glow.addColorStop(0, 'rgba(255,220,150,0.14)');
  glow.addColorStop(0.5, 'rgba(255,210,130,0.05)');
  glow.addColorStop(1, 'rgba(255,200,100,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(cx - 140, cy - 30, 280, 180);
  ctx.restore();
}

// 踢脚线 + 腰线
function drawBaseboard(ctx, color) {
  // 踢脚线
  ctx.fillStyle = color;
  ctx.fillRect(BACK_L, BACK_B - 12, BACK_R - BACK_L, 12);
  // 踢脚线高光
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.fillRect(BACK_L, BACK_B - 12, BACK_R - BACK_L, 2);
  // 腰线装饰
  var wainY = BACK_T + (BACK_B - BACK_T) * 0.55;
  ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(BACK_L, wainY); ctx.lineTo(BACK_R, wainY); ctx.stroke();
}

// 暖光光晕（台灯、夜灯等）
function drawWarmGlow(ctx, x, y, radius, color) {
  ctx.save();
  var g = ctx.createRadialGradient(x, y, 0, x, y, radius);
  g.addColorStop(0, color);
  g.addColorStop(1, color.replace(/[\d.]+\)$/, '0)'));
  ctx.fillStyle = g;
  ctx.fillRect(x - radius, y - radius, radius * 2, radius * 2);
  ctx.restore();
}

// ===================== 三个房间 =====================

function drawLivingroomBg(ctx) {
  // 温馨客厅 — 蜂蜜木色 + 暖灯光
  drawPerspectiveRoom(ctx, '#7a6e5e', '#8a7d6e', '#9a7e58', '#8a7050', '#4a4038');
  drawWoodPlanks(ctx, 'rgba(60,40,20,0.07)', 'rgba(60,40,20,0.03)', 12);
  drawWindow(ctx, 0.12, 0.38, 0.12, 0.60, '#6699bb', false);
  drawBaseboard(ctx, '#5a4a3a');
  drawCeilingLight(ctx);
  // 腰线下方护墙板（略深）
  ctx.fillStyle = 'rgba(0,0,0,0.03)';
  var wainY = BACK_T + (BACK_B - BACK_T) * 0.55;
  ctx.fillRect(BACK_L, wainY, BACK_R - BACK_L, BACK_B - wainY - 12);
  // 台灯暖光晕（微微脉动呼吸感）
  var glowPulse = 1.0 + Math.sin(Date.now() / 2000) * 0.08;
  drawWarmGlow(ctx, 140, 510, 130 * glowPulse, 'rgba(255,200,100,0.06)');
}

function drawKitchenBg(ctx) {
  // 明亮厨房 — 奶油暖白
  drawPerspectiveRoom(ctx, '#c8b898', '#ddd0b8', '#c0a878', '#b09868', '#d8ccb0');
  drawFloorGrid(ctx, 'rgba(100,80,50,0.06)', 10, 10);
  // 后墙瓷砖
  ctx.strokeStyle = 'rgba(0,0,0,0.04)'; ctx.lineWidth = 0.5;
  for (var t = 0; t < (BACK_B - BACK_T); t += 25) {
    ctx.beginPath(); ctx.moveTo(BACK_L, BACK_T + t); ctx.lineTo(BACK_R, BACK_T + t); ctx.stroke();
  }
  for (var s = 0; s < (BACK_R - BACK_L); s += 35) {
    ctx.beginPath(); ctx.moveTo(BACK_L + s, BACK_T); ctx.lineTo(BACK_L + s, BACK_B); ctx.stroke();
  }
  drawWindow(ctx, 0.35, 0.62, 0.10, 0.50, '#88bbdd', false);
  drawBaseboard(ctx, '#a09078');
  drawCeilingLight(ctx);
}

function drawBedroomBg(ctx) {
  // 温馨卧室 — 夜间柔紫 + 月光
  drawPerspectiveRoom(ctx, '#6a6080', '#7a7090', '#7a6858', '#6a5848', '#3a3248');
  drawWoodPlanks(ctx, 'rgba(0,0,0,0.04)', 'rgba(0,0,0,0.02)', 10);
  // 后墙上的星星壁纸
  ctx.fillStyle = 'rgba(255,255,200,0.06)';
  for (var si = 0; si < 25; si++) {
    var sx = BACK_L + 15 + ((si * 47) % (BACK_R - BACK_L - 30));
    var sy = BACK_T + 12 + ((si * 31) % (BACK_B - BACK_T - 24));
    var sr = 0.8 + (si % 4) * 0.5;
    ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI*2); ctx.fill();
  }
  // 夜间窗户 + 月亮
  var win = drawWindow(ctx, 0.55, 0.82, 0.10, 0.55, '#223355', true);
  // 月亮
  var moonX = win.l + (win.r - win.l) * 0.3, moonY = win.t + (win.b - win.t) * 0.3;
  ctx.beginPath(); ctx.arc(moonX, moonY, 10, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,200,0.5)'; ctx.fill();
  // 月光柔光
  ctx.save();
  var mg = ctx.createRadialGradient(moonX, moonY, 3, moonX, moonY, 60);
  mg.addColorStop(0, 'rgba(220,220,255,0.10)');
  mg.addColorStop(1, 'rgba(220,220,255,0)');
  ctx.fillStyle = mg;
  ctx.fillRect(moonX - 60, moonY - 60, 120, 120);
  ctx.restore();

  drawBaseboard(ctx, '#5a5040');
  drawCeilingLight(ctx);
  // 床头灯暖光（微微脉动）
  var glowPulse2 = 1.0 + Math.sin(Date.now() / 2500) * 0.06;
  drawWarmGlow(ctx, 140, 530, 110 * glowPulse2, 'rgba(255,190,100,0.06)');
}

function drawCatTail(ctx, cat, dx, dy) {
  if (!cat.tailActive || cat.found) return;
  var progress = cat.tailElapsed / cat.tailDuration;
  var alpha = progress < 0.3 ? progress/0.3 : progress > 0.7 ? (1-progress)/0.3 : 1;
  ctx.save();
  ctx.globalAlpha = alpha * 0.8;
  var baseX = dx !== undefined ? dx : cat.x;
  var baseY = dy !== undefined ? dy : cat.y;
  var tx = baseX + cat.w + 2;
  var ty = baseY + cat.h * 0.7;
  var sway = Math.sin(cat.tailElapsed * 5) * 6;
  ctx.beginPath();
  ctx.moveTo(tx, ty);
  ctx.quadraticCurveTo(tx + 12, ty - 15 + sway, tx + 8, ty - 28 + sway);
  ctx.strokeStyle = cat.color;
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  ctx.stroke();
  ctx.lineCap = 'butt';
  ctx.restore();
}

function drawCatBubble(ctx, cat, dx, dy) {
  if (!cat.bubbleActive || cat.found) return;
  var progress = cat.bubbleElapsed / cat.bubbleDuration;
  var alpha = progress < 0.2 ? progress/0.2 : progress > 0.75 ? (1-progress)/0.25 : 1;
  ctx.save();
  ctx.globalAlpha = alpha * 0.85;
  var baseX = dx !== undefined ? dx : cat.x;
  var baseY = dy !== undefined ? dy : cat.y;
  var bx = baseX + cat.w * 0.5;
  var by = baseY - 8;
  // 浮动效果
  by -= Math.sin(cat.bubbleElapsed * 2) * 3;
  // 气泡背景
  ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  var tw = ctx.measureText(cat.bubbleText).width;
  DrawUtils.roundRect(ctx, bx-tw/2-8, by-20, tw+16, 22, 8, 'rgba(255,255,255,0.9)');
  // 小三角
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.beginPath(); ctx.moveTo(bx-4, by+2); ctx.lineTo(bx+4, by+2); ctx.lineTo(bx, by+8); ctx.closePath(); ctx.fill();
  // 文字
  ctx.fillStyle = '#333';
  ctx.fillText(cat.bubbleText, bx, by-2);
  ctx.restore();
}

function drawCatEyes(ctx, cat, dx, dy) {
  if (!cat.eyeActive || cat.found) return;
  var progress = cat.eyeElapsed / cat.eyeDuration;
  var alpha = progress < 0.25 ? progress/0.25 : progress > 0.7 ? (1-progress)/0.3 : 1;
  ctx.save();
  ctx.globalAlpha = alpha * 0.7;
  var baseX = dx !== undefined ? dx : cat.x;
  var baseY = dy !== undefined ? dy : cat.y;
  // 两只小眼睛从物品底部偷看
  var ex1 = baseX + cat.w * 0.35;
  var ex2 = baseX + cat.w * 0.65;
  var ey = baseY + cat.h - 4;
  var eyeSize = 3;
  // 眼白
  ctx.fillStyle = cat.color;
  ctx.beginPath(); ctx.arc(ex1, ey, eyeSize+1.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(ex2, ey, eyeSize+1.5, 0, Math.PI*2); ctx.fill();
  // 瞳孔
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(ex1, ey, eyeSize, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(ex2, ey, eyeSize, 0, Math.PI*2); ctx.fill();
  // 高光
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(ex1+1, ey-1, 1.2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(ex2+1, ey-1, 1.2, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

// 弹性缓动
function easeOutBack(t) {
  var c = 1.7;
  return 1 + (--t) * t * ((c + 1) * t + c);
}

function drawFoundCat(ctx, cat) {
  var p = cat.foundAnim; // 0→1
  var cx = cat.x + cat.w/2, cy = cat.y + cat.h/2;
  var itemScale = cat.scale || ITEM_SCALE;

  // ── 阶段1: 伪装物品剧烈震颤 (0~0.2) ──
  if (p < 0.2) {
    var shakeP = p / 0.2;
    var intensity = shakeP * 6;
    var sx = Math.sin(p * 80) * intensity;
    var sy = Math.cos(p * 60) * intensity * 0.5;
    ctx.save();
    ctx.translate(cat.baseX + sx, cat.baseY + sy);
    ctx.scale(itemScale, itemScale);
    cat.drawFn(ctx, -cat.origW/2, -cat.origH, cat.origW, cat.origH);
    ctx.restore();
    ctx.save(); ctx.globalAlpha = shakeP * 0.4; ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 1.5;
    for (var li = 0; li < 4; li++) {
      var la = (li/4) * Math.PI * 2 + p * 20;
      var ld = cat.w * 0.4 + shakeP * 8;
      ctx.beginPath(); ctx.moveTo(cx + Math.cos(la)*ld, cy + Math.sin(la)*ld);
      ctx.lineTo(cx + Math.cos(la)*(ld+6), cy + Math.sin(la)*(ld+6)); ctx.stroke();
    }
    ctx.restore();
    return;
  }

  // ── 阶段2: 缩小消失 + 烟雾爆发 (0.2~0.45) ──
  if (p < 0.45) {
    var shrinkP = (p - 0.2) / 0.25;
    if (shrinkP < 0.6) {
      var ss = 1 - shrinkP / 0.6;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(shrinkP * 0.5);
      ctx.scale(itemScale * ss, itemScale * ss);
      ctx.globalAlpha = ss;
      cat.drawFn(ctx, -cat.origW/2, -cat.origH/2, cat.origW, cat.origH);
      ctx.restore();
    }
    ctx.save();
    var smokeAlpha = shrinkP < 0.5 ? shrinkP * 2 : 2 - shrinkP * 2;
    ctx.globalAlpha = smokeAlpha * 0.7;
    for (var si = 0; si < 8; si++) {
      var sa = (si/8) * Math.PI * 2 + shrinkP * 2;
      var sd = shrinkP * 40;
      var sr = 5 + shrinkP * 12 - shrinkP * shrinkP * 8;
      var colors = ['#ffd700','#ff9944','#ffcc66','#fff5cc','#ffaa88','#ffe066','#ffbb44','#fff'];
      ctx.beginPath(); ctx.arc(cx + Math.cos(sa)*sd, cy + Math.sin(sa)*sd, sr, 0, Math.PI*2);
      ctx.fillStyle = colors[si]; ctx.fill();
    }
    var flashR = 15 + shrinkP * 25;
    var grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, flashR);
    grd.addColorStop(0, 'rgba(255,255,255,' + (smokeAlpha * 0.8) + ')');
    grd.addColorStop(1, 'rgba(255,215,0,0)');
    ctx.fillStyle = grd; ctx.fillRect(cx - flashR, cy - flashR, flashR*2, flashR*2);
    ctx.restore();
    return;
  }

  // ── 阶段3: 猫咪弹性弹出 + poof云 + 惊讶表情 (0.45~0.7) ──
  var catSize = 42;
  if (p < 0.7) {
    var popP = (p - 0.45) / 0.25;
    var scale = easeOutBack(Math.min(1, popP));
    // "Poof" cloud behind the cat
    ctx.save();
    var poofAlpha = (1 - popP) * 0.6;
    ctx.globalAlpha = poofAlpha;
    var poofColors = ['#fff', '#fff8e1', '#fffbe6', '#f5f5f5'];
    var poofAngles = [0.3, 1.8, 3.4, 5.0];
    for (var pi = 0; pi < 4; pi++) {
      var pa = poofAngles[pi];
      var pDist = 8 + popP * 18;
      var pRadius = 10 + popP * 14 - popP * popP * 6;
      ctx.beginPath();
      ctx.arc(cx + Math.cos(pa) * pDist, cy + Math.sin(pa) * pDist, pRadius * scale, 0, Math.PI * 2);
      ctx.fillStyle = poofColors[pi]; ctx.fill();
    }
    ctx.restore();
    // Cat pops out
    ctx.save();
    ctx.globalAlpha = Math.min(1, popP * 2);
    ctx.translate(cx, cy);
    ctx.scale(scale, scale);
    DrawUtils.drawCat(ctx, 0, 0, catSize, cat.color);
    ctx.restore();
    // Surprised expression
    ctx.save();
    ctx.globalAlpha = Math.min(1, popP * 2.5);
    ctx.font = (14 + popP * 4) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('😺', cx, cy - catSize * scale * 0.5 - 12);
    ctx.restore();
    // 散开的星星
    ctx.save(); ctx.globalAlpha = (1 - popP) * 0.6;
    for (var ti = 0; ti < 6; ti++) {
      var ta = (ti/6)*Math.PI*2 - popP*1.5;
      var td = 20 + popP * 30;
      ctx.font = (8 + popP*4) + 'px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('✦', cx + Math.cos(ta)*td, cy + Math.sin(ta)*td);
    }
    ctx.restore();
    return;
  }

  // ── 阶段4: 猫咪微跳 + 尾巴摇摆 + 声波 + 庆祝 (0.7~0.85) ──
  if (p < 0.85) {
    var bounceP = (p - 0.7) / 0.15;
    var bounce = Math.sin(bounceP * Math.PI) * 8;
    ctx.save();
    DrawUtils.drawCat(ctx, cx, cy - bounce, catSize, cat.color);
    // Happy expression
    ctx.font = '16px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('😸', cx, cy - bounce - catSize * 0.5 - 12);
    // Tail wag
    ctx.save();
    ctx.strokeStyle = cat.color; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
    var tailSwayAngle = Math.sin(bounceP * Math.PI * 4) * 0.6;
    var tailBaseX = cx - catSize * 0.35;
    var tailBaseY = cy - bounce + catSize * 0.15;
    ctx.beginPath(); ctx.moveTo(tailBaseX, tailBaseY);
    ctx.quadraticCurveTo(tailBaseX - 12 + Math.sin(tailSwayAngle) * 10, tailBaseY - 8,
      tailBaseX - 8 + Math.sin(tailSwayAngle) * 14, tailBaseY - 18);
    ctx.stroke();
    ctx.restore();
    // Sound wave arcs ("meow!")
    ctx.save();
    for (var wi = 0; wi < 3; wi++) {
      var waveDelay = wi * 0.15;
      var waveP = Math.max(0, Math.min(1, (bounceP - waveDelay) / 0.5));
      if (waveP > 0 && waveP < 1) {
        ctx.globalAlpha = (1 - waveP) * 0.5;
        ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 1.5;
        var arcRadius = 15 + waveP * 25;
        ctx.beginPath();
        ctx.arc(cx + catSize * 0.4, cy - bounce - catSize * 0.2, arcRadius, -Math.PI * 0.3, Math.PI * 0.3);
        ctx.stroke();
      }
    }
    ctx.restore();
    // Orbiting decorations with personality icon
    ctx.globalAlpha = 0.5 + Math.sin(bounceP * Math.PI) * 0.5;
    ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
    var personalityIcon = (cat.personality && cat.personality.icon) ? cat.personality.icon : '♥';
    var decos = ['♥', '★', personalityIcon, '✦'];
    for (var di = 0; di < decos.length; di++) {
      var da = (di/decos.length)*Math.PI*2 + bounceP*3;
      var dd = 30 + Math.sin(bounceP*Math.PI)*10;
      ctx.fillText(decos[di], cx + Math.cos(da)*dd, cy - bounce + Math.sin(da)*dd - 5);
    }
    ctx.restore();
    return;
  }

  // ── 阶段5: 静止猫咪 + 打字机语录气泡 + 猫爪装饰 (0.85~1.0) ──
  ctx.save();
  DrawUtils.drawCat(ctx, cx, cy, catSize, cat.color);
  var bubbleP = (p - 0.85) / 0.15;
  var fullQuote = cat.quote || '';
  var revealCount = Math.floor(bubbleP * fullQuote.length);
  if (bubbleP >= 1) revealCount = fullQuote.length;
  var visibleText = fullQuote.substring(0, revealCount);
  if (revealCount > 0 || bubbleP > 0.05) {
    ctx.globalAlpha = Math.min(1, bubbleP * 3);
    ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    var tw = ctx.measureText(fullQuote).width;
    var bx = cx - tw/2 - 12, by = cy - catSize - 32, bw = tw + 24, bh = 28;
