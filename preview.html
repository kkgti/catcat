// ==================== PATCH: Relocating Cat Behavior ====================
function initRelocateCats() {
  if (game.currentRoomIdx < 2) {
    game.cats.forEach(function(cat) {
      cat.canRelocate = false;
      cat.hasRelocated = false;
      cat.stareTimer = 0;
      cat.relocating = false;
      cat.relocateTimer = 0;
      cat.relocatePhase = '';
      cat.relocateAlpha = 1;
      cat.relocateScale = 1;
      cat.relocateOldX = 0;
      cat.relocateOldY = 0;
      cat.relocatePoofTimer = 0;
      cat.relocateShimmerTimer = 0;
    });
    return;
  }
  var unfoundCats = game.cats.filter(function(c) { return !c.found; });
  var count = Math.max(1, Math.round(unfoundCats.length * 0.3));
  var shuffled = unfoundCats.slice();
  for (var i = shuffled.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = shuffled[i]; shuffled[i] = shuffled[j]; shuffled[j] = tmp;
  }
  var selected = {};
  for (var k = 0; k < count && k < shuffled.length; k++) {
    selected[shuffled[k].id] = true;
  }
  game.cats.forEach(function(cat) {
    cat.canRelocate = !!selected[cat.id];
    cat.hasRelocated = false;
    cat.stareTimer = 0;
    cat.relocating = false;
    cat.relocateTimer = 0;
    cat.relocatePhase = '';
    cat.relocateAlpha = 1;
    cat.relocateScale = 1;
    cat.relocateOldX = 0;
    cat.relocateOldY = 0;
    cat.relocatePoofTimer = 0;
    cat.relocateShimmerTimer = 0;
  });
}

function updateRelocateCats(dt) {
  if (!game.cats) return;
  game.cats.forEach(function(cat) {
    if (cat.found) return;
    if (cat.relocating) {
      cat.relocateTimer -= dt;
      var remaining = cat.relocateTimer;
      if (remaining > 0.4) {
        cat.relocatePhase = 'fadeout';
        var fadeOutProgress = 1 - (remaining - 0.4) / 0.4;
        cat.relocateAlpha = 1 - fadeOutProgress;
        cat.relocateScale = 1 - fadeOutProgress * 0.3;
      } else if (remaining > 0) {
        if (cat.relocatePhase === 'fadeout') {
          performRelocation(cat);
          cat.relocatePhase = 'fadein';
        }
        var fadeInProgress = 1 - remaining / 0.4;
        cat.relocateAlpha = fadeInProgress;
        cat.relocateScale = 0.7 + fadeInProgress * 0.3;
      } else {
        cat.relocating = false;
        cat.relocatePhase = '';
        cat.relocateAlpha = 1;
        cat.relocateScale = 1;
      }
      if (cat.relocatePoofTimer > 0) { cat.relocatePoofTimer -= dt; }
      if (cat.relocateShimmerTimer > 0) { cat.relocateShimmerTimer -= dt; }
      return;
    }
    if (cat._warningTimer !== undefined && cat._warningTimer > 0) {
      cat._warningTimer -= dt;
      if (cat._warningTimer <= 0) {
        cat.relocating = true;
        cat.relocateTimer = 0.8;
        cat.relocatePhase = 'fadeout';
        cat.relocateAlpha = 1;
        cat.relocateScale = 1;
        cat.relocateOldX = cat.x + cat.w / 2;
        cat.relocateOldY = cat.y + cat.h / 2;
        cat.relocatePoofTimer = 0.6;
        game.toast = '有只猫转移了！';
        game.toastTimer = 2.0;
      }
      return;
    }
    if (!cat.canRelocate || cat.hasRelocated) return;
    var catScreenX = cat.x - game.camX;
    var catScreenY = cat.y - game.camY;
    var catVisible = (
      catScreenX + cat.w > 0 &&
      catScreenX < VIEW_W &&
      catScreenY + cat.h > 0 &&
      catScreenY < VIEW_H
    );
    if (catVisible) {
      cat.stareTimer += dt;
    } else {
      cat.stareTimer = 0;
    }
    if (cat.stareTimer >= 3.0) {
      cat.stareTimer = 0;
      cat.hasRelocated = true;
      cat._warningTimer = 0.5;
      cat._warningWobble = true;
    }
  });
}

function performRelocation(cat) {
  var candidates = game.allItems.filter(function(it) {
    return !it.isCat && it.id !== cat.disguiseId;
  });
  if (candidates.length === 0) return;
  var target = candidates[Math.floor(Math.random() * candidates.length)];
  var catItem = null;
  for (var i = 0; i < game.allItems.length; i++) {
    if (game.allItems[i].isCat && game.allItems[i].catRef === cat) {
      catItem = game.allItems[i]; break;
    }
  }
  if (!catItem) return;
  _spawnRelocatePoof(cat.relocateOldX, cat.relocateOldY);
  var oldTargetX = target.x, oldTargetY = target.y, oldTargetW = target.w, oldTargetH = target.h;
  var oldTargetOrigW = target.origW, oldTargetOrigH = target.origH, oldTargetScale = target.scale;
  var oldTargetBaseX = target.baseX, oldTargetBaseY = target.baseY, oldTargetDepth = target.depth;
  var oldTargetDrawFn = target.drawFn, oldTargetName = target.name, oldTargetId = target.id, oldTargetZone = target.zone;
  var oldCatX = catItem.x, oldCatY = catItem.y, oldCatW = catItem.w, oldCatH = catItem.h;
  var oldCatOrigW = catItem.origW, oldCatOrigH = catItem.origH, oldCatScale = catItem.scale;
  var oldCatBaseX = catItem.baseX, oldCatBaseY = catItem.baseY, oldCatDepth = catItem.depth;
  var oldCatDrawFn = catItem.drawFn, oldCatName = catItem.name;
  catItem.x = oldTargetX; catItem.y = oldTargetY; catItem.w = oldTargetW; catItem.h = oldTargetH;
  catItem.origW = oldTargetOrigW; catItem.origH = oldTargetOrigH; catItem.scale = oldTargetScale;
  catItem.baseX = oldTargetBaseX; catItem.baseY = oldTargetBaseY; catItem.depth = oldTargetDepth;
  catItem.drawFn = oldTargetDrawFn; catItem.name = oldTargetName;
  cat.x = oldTargetX; cat.y = oldTargetY; cat.w = oldTargetW; cat.h = oldTargetH;
  cat.origW = oldTargetOrigW; cat.origH = oldTargetOrigH; cat.scale = oldTargetScale;
  cat.baseX = oldTargetBaseX; cat.baseY = oldTargetBaseY; cat.depth = oldTargetDepth;
  cat.drawFn = oldTargetDrawFn; cat.name = oldTargetName; cat.disguiseId = oldTargetId;
  target.x = oldCatX; target.y = oldCatY; target.w = oldCatW; target.h = oldCatH;
  target.origW = oldCatOrigW; target.origH = oldCatOrigH; target.scale = oldCatScale;
  target.baseX = oldCatBaseX; target.baseY = oldCatBaseY; target.depth = oldCatDepth;
  target.drawFn = oldCatDrawFn; target.name = oldCatName; target.zone = oldTargetZone;
  cat.relocateShimmerTimer = 0.6;
}

function drawRelocatingCat(ctx, cat) {
  var catItem = null;
  for (var i = 0; i < game.allItems.length; i++) {
    if (game.allItems[i].isCat && game.allItems[i].catRef === cat) {
      catItem = game.allItems[i]; break;
    }
  }
  if (!catItem) return;
  var itemScale = catItem.scale || 1.0;
  ctx.save();
  ctx.globalAlpha = Math.max(0, cat.relocateAlpha);
  var scaleAdj = cat.relocateScale;
  ctx.translate(catItem.baseX, catItem.baseY);
  ctx.scale(itemScale * scaleAdj, itemScale * scaleAdj);
  catItem.drawFn(ctx, -catItem.origW / 2, -catItem.origH, catItem.origW, catItem.origH);
  ctx.restore();
  if (cat.relocatePoofTimer > 0 && cat.relocatePhase === 'fadeout') {
    _drawPoof(ctx, cat.relocateOldX, cat.relocateOldY, cat.relocatePoofTimer / 0.6);
  }
  if (cat.relocateShimmerTimer > 0 && cat.relocatePhase === 'fadein') {
    _drawShimmer(ctx, catItem.baseX, catItem.baseY - catItem.h / 2, cat.relocateShimmerTimer / 0.6);
  }
}

function _spawnRelocatePoof(cx, cy) {
  if (!game.particles) return;
  for (var i = 0; i < 8; i++) {
    var angle = Math.random() * Math.PI * 2;
    var speed = 20 + Math.random() * 40;
    var life = 0.4 + Math.random() * 0.3;
    game.particles.push({
      type: 'poof', x: cx + (Math.random() - 0.5) * 10, y: cy + (Math.random() - 0.5) * 10,
      vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 15,
      life: life, maxLife: life, size: 4 + Math.random() * 6, color: 'rgba(200,200,200,0.7)'
    });
  }
}

function _drawPoof(ctx, cx, cy, progress) {
  var alpha = progress * 0.6;
  var radius = 15 + (1 - progress) * 20;
  ctx.save();
  ctx.globalAlpha = alpha;
  for (var i = 0; i < 5; i++) {
    var angle = (i / 5) * Math.PI * 2 + progress * 2;
    var dist = radius * (0.5 + Math.random() * 0.3);
    var px = cx + Math.cos(angle) * dist;
    var py = cy + Math.sin(angle) * dist;
    var r = 6 + (1 - progress) * 8;
    ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(180,180,180,' + (alpha * 0.5) + ')';
    ctx.fill();
  }
  ctx.restore();
}

function _drawShimmer(ctx, cx, cy, progress) {
  var alpha = progress * 0.5;
  ctx.save();
  ctx.globalAlpha = alpha;
  for (var i = 0; i < 6; i++) {
    var angle = (i / 6) * Math.PI * 2 + Date.now() / 200;
    var len = 8 + (1 - progress) * 12;
    var sx = cx + Math.cos(angle) * 4, sy = cy + Math.sin(angle) * 4;
    var ex = cx + Math.cos(angle) * (4 + len), ey = cy + Math.sin(angle) * (4 + len);
    ctx.strokeStyle = 'rgba(255,255,200,' + alpha + ')';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); ctx.stroke();
  }
  var grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 12);
  grad.addColorStop(0, 'rgba(255,255,220,' + (alpha * 0.8) + ')');
  grad.addColorStop(1, 'rgba(255,255,220,0)');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(cx, cy, 12, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

// ==================== PATCH: Buddy Cat Pair System ====================
function initBuddyCats() {
  game.cats.forEach(function(c) {
    c.buddy = null; c.buddyAlert = 0; c.buddyAlertBubble = '';
    c.buddyFoundTime = 0; c._buddyLineAlpha = 0; c._buddyLineFrom = null;
  });
  if (game.cats.length < 3) return;
  var bestDist = Infinity, bestA = null, bestB = null;
  for (var i = 0; i < game.cats.length; i++) {
    for (var j = i + 1; j < game.cats.length; j++) {
      var a = game.cats[i], b = game.cats[j];
      var dx = (a.x + a.w / 2) - (b.x + b.w / 2);
      var dy = (a.y + a.h / 2) - (b.y + b.h / 2);
      var dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < bestDist) { bestDist = dist; bestA = a; bestB = b; }
    }
  }
  if (bestDist <= 150 && bestA && bestB) {
    bestA.buddy = bestB; bestB.buddy = bestA;
  }
}

function onBuddyCatFound(cat) {
  cat.buddyFoundTime = Date.now() / 1000;
  if (!cat.buddy) return;
  var buddy = cat.buddy;
  if (buddy.found && buddy.buddyFoundTime > 0) {
    var gap = Math.abs(cat.buddyFoundTime - buddy.buddyFoundTime);
    if (gap <= 5) {
      game.combo++;
      if (game.combo > game.maxCombo) game.maxCombo = game.combo;
      game.comboTimer = game.comboWindow;
      game.toast = '搭档默契！双倍积分!'; game.toastTimer = 2.5;
      var cx = cat.x + cat.w / 2, cy = cat.y - 10;
      game.comboPopup = { count: game.combo, timer: 1.5, x: cx, y: cy };
      if (typeof spawnParticles === 'function') { spawnParticles(cx, cy + 10, 1.5); }
      if (typeof unlockAchievement === 'function') { unlockAchievement('buddy_finder'); }
    }
    return;
  }
  if (!buddy.found) {
    buddy.buddyAlert = 3.0;
    buddy.buddyAlertBubble = '喵?! 同伴被发现了!';
    buddy._buddyLineAlpha = 1.0;
    buddy._buddyLineFrom = { x: cat.x + cat.w / 2, y: cat.y + cat.h / 2 };
    buddy.wobbleActive = true; buddy.wobbleElapsed = 0; buddy.wobbleDuration = 3.0;
    buddy.wobbleStrength = (buddy.personality.wobbleStrength || 3) * 2.5;
  }
}

function updateBuddyAlert(dt) {
  game.cats.forEach(function(cat) {
    if (cat.buddyAlert > 0) {
      cat.buddyAlert -= dt;
      if (cat._buddyLineAlpha > 0) {
        cat._buddyLineAlpha -= dt / 2.0;
        if (cat._buddyLineAlpha < 0) cat._buddyLineAlpha = 0;
      }
      if (cat.buddyAlert <= 0) {
        cat.buddyAlert = 0; cat.buddyAlertBubble = '';
        cat._buddyLineAlpha = 0; cat._buddyLineFrom = null;
        cat.wobbleStrength = cat.personality.wobbleStrength *
          ((typeof game.currentRoom !== 'undefined' && game.currentRoom && game.currentRoom.wobbleStrengthMult) ? game.currentRoom.wobbleStrengthMult : 1);
      }
    }
  });
}

function drawBuddyAlert(ctx, cat) {
  if (!cat.buddyAlert || cat.buddyAlert <= 0) return;
  if (cat.found) return;
  var cx = cat.x + cat.w / 2, cy = cat.y + cat.h / 2;
  var t = Date.now() / 1000;
  ctx.save();
  var pulseAlpha = 0.5 + 0.5 * Math.sin(t * 6);
  var alertRatio = Math.min(cat.buddyAlert / 3.0, 1.0);
  ctx.strokeStyle = 'rgba(255, 200, 50, ' + (pulseAlpha * alertRatio).toFixed(2) + ')';
  ctx.lineWidth = 2;
  ctx.shadowColor = 'rgba(255, 200, 50, 0.6)'; ctx.shadowBlur = 8;
  var pad = 4;
  var rx = cat.x - pad, ry = cat.y - pad, rw = cat.w + pad * 2, rh = cat.h + pad * 2, radius = 6;
  ctx.beginPath();
  ctx.moveTo(rx + radius, ry); ctx.lineTo(rx + rw - radius, ry);
  ctx.arcTo(rx + rw, ry, rx + rw, ry + radius, radius);
  ctx.lineTo(rx + rw, ry + rh - radius);
  ctx.arcTo(rx + rw, ry + rh, rx + rw - radius, ry + rh, radius);
  ctx.lineTo(rx + radius, ry + rh);
  ctx.arcTo(rx, ry + rh, rx, ry + rh - radius, radius);
  ctx.lineTo(rx, ry + radius);
  ctx.arcTo(rx, ry, rx + radius, ry, radius);
  ctx.closePath(); ctx.stroke();
  ctx.shadowBlur = 0;
  if (cat._buddyLineFrom && cat._buddyLineAlpha > 0) {
    var fromX = cat._buddyLineFrom.x, fromY = cat._buddyLineFrom.y;
    ctx.strokeStyle = 'rgba(255, 200, 50, ' + (cat._buddyLineAlpha * 0.6).toFixed(2) + ')';
    ctx.lineWidth = 1.5; ctx.setLineDash([4, 6]);
    ctx.beginPath(); ctx.moveTo(fromX, fromY); ctx.lineTo(cx, cy); ctx.stroke();
    ctx.setLineDash([]);
  }
  if (cat.buddyAlertBubble) {
    var bubbleX = cx, bubbleY = cat.y - 24;
    var fadeIn = Math.min((3.0 - cat.buddyAlert) / 0.3, 1.0);
    var fadeOut = Math.min(cat.buddyAlert / 0.5, 1.0);
    var bubbleAlpha = Math.min(fadeIn, fadeOut);
    ctx.globalAlpha = bubbleAlpha;
    ctx.font = 'bold 10px sans-serif';
    var tw = ctx.measureText(cat.buddyAlertBubble).width;
    var bw = tw + 14, bh = 20, bx = bubbleX - bw / 2, by = bubbleY - bh;
    ctx.fillStyle = 'rgba(255, 230, 100, 0.92)';
    ctx.beginPath();
    ctx.moveTo(bx + 4, by); ctx.lineTo(bx + bw - 4, by);
    ctx.arcTo(bx + bw, by, bx + bw, by + 4, 4);
    ctx.lineTo(bx + bw, by + bh - 4);
    ctx.arcTo(bx + bw, by + bh, bx + bw - 4, by + bh, 4);
    ctx.lineTo(bx + 4, by + bh);
    ctx.arcTo(bx, by + bh, bx, by + bh - 4, 4);
    ctx.lineTo(bx, by + 4);
    ctx.arcTo(bx, by, bx + 4, by, 4);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(bubbleX - 4, by + bh); ctx.lineTo(bubbleX, by + bh + 6);
    ctx.lineTo(bubbleX + 4, by + bh); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = 'rgba(200, 150, 0, 0.7)'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(bx + 4, by); ctx.lineTo(bx + bw - 4, by);
    ctx.arcTo(bx + bw, by, bx + bw, by + 4, 4);
    ctx.lineTo(bx + bw, by + bh - 4);
    ctx.arcTo(bx + bw, by + bh, bx + bw - 4, by + bh, 4);
    ctx.lineTo(bx + 4, by + bh);
    ctx.arcTo(bx, by + bh, bx, by + bh - 4, 4);
    ctx.lineTo(bx, by + 4);
    ctx.arcTo(bx, by, bx + 4, by, 4);
    ctx.closePath(); ctx.stroke();
    ctx.fillStyle = '#6b4c00'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(cat.buddyAlertBubble, bubbleX, by + bh / 2);
  }
  ctx.restore();
}

function handleFeatherToolBtnClick() {

function handleFeatherActivation(rx, ry) {

  game.featherX = rx; game.featherY = ry;

function updateFeatherEffect(dt) {

    game.featherTimer -= dt;
    if (game.featherTimer <= 0) { game.featherActive = false; }
  }
  game.cats.forEach(function(cat) {
    if (cat.found) return;
    if (cat.featherForced && cat.featherForced > 0) {
      cat.featherForced -= dt;
      if (cat.featherForced > 0) {
        cat.wobbleActive = true;
        cat.wobbleDuration = cat.featherForced + 0.1;
        cat.wobbleStrength = (cat.personality.wobbleStrength * (ROOMS[game.currentRoomIdx].wobbleStrengthMult || 1)) * 2;
      } else {

      }
    }
  });
}

function drawFeatherEffect(ctx) {
  var totalDuration = 2.5;
  var elapsed = totalDuration - game.featherTimer;
  var expandDuration = 0.5;
  var radiusProgress = Math.min(elapsed / expandDuration, 1.0);
  var currentRadius = game.featherRadius * radiusProgress;
  var alpha;
  if (elapsed < 0.15) { alpha = elapsed / 0.15 * 0.7; }
  else if (game.featherTimer < 0.5) { alpha = (game.featherTimer / 0.5) * 0.7; }
  else { alpha = 0.7; }
  var t = Date.now() / 1000;
  var cx = game.featherX, cy = game.featherY;
  ctx.save(); ctx.globalAlpha = alpha;
  var ringColors = ['rgba(255,165,0,0.5)', 'rgba(255,191,64,0.4)', 'rgba(255,215,100,0.3)'];
  for (var r = 0; r < 3; r++) {
    var ringRadius = currentRadius * (0.4 + r * 0.3);
    ringRadius += Math.sin(t * 4 + r * 2) * 3;
    ctx.beginPath(); ctx.arc(cx, cy, Math.max(0, ringRadius), 0, Math.PI * 2);
    ctx.strokeStyle = ringColors[r]; ctx.lineWidth = 2.5 - r * 0.5;
    ctx.setLineDash([6, 4]); ctx.stroke(); ctx.setLineDash([]);
  }
  ctx.globalAlpha = alpha; ctx.save();
  ctx.translate(cx, cy); ctx.rotate(t * 2);
  var bobY = Math.sin(t * 3) * 5;
  ctx.font = '24px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('\uD83E\uDEB6', 0, bobY); ctx.restore();
  var sparkleCount = 12;
  for (var i = 0; i < sparkleCount; i++) {
    var seed = i * 137.508;
    var angle = (seed + t * (0.8 + (i % 3) * 0.3)) % (Math.PI * 2);
    var dist = currentRadius * (0.15 + ((i * 0.618) % 1) * 0.75);
    var sx = cx + Math.cos(angle) * dist, sy = cy + Math.sin(angle) * dist;
    var twinkle = 0.3 + 0.7 * Math.abs(Math.sin(t * 5 + i * 1.2));
    ctx.globalAlpha = alpha * twinkle * 0.8;
    var sparkSize = 2 + Math.sin(t * 3 + i) * 1;
    ctx.beginPath();
    ctx.moveTo(sx, sy - sparkSize); ctx.lineTo(sx + sparkSize * 0.4, sy);
    ctx.lineTo(sx, sy + sparkSize); ctx.lineTo(sx - sparkSize * 0.4, sy);
    ctx.closePath(); ctx.fillStyle = '#ffcc33'; ctx.fill();
    ctx.beginPath();
    ctx.moveTo(sx - sparkSize, sy); ctx.lineTo(sx, sy + sparkSize * 0.4);
    ctx.lineTo(sx + sparkSize, sy); ctx.lineTo(sx, sy - sparkSize * 0.4);
    ctx.closePath(); ctx.fillStyle = '#ffe080'; ctx.fill();
  }
  for (var j = 0; j < 6; j++) {
    var trailAngle = (j / 6) * Math.PI * 2 + t * 1.5;
    var trailDist = currentRadius * 0.9 + Math.sin(t * 2 + j * 3) * 8;
    var tx = cx + Math.cos(trailAngle) * trailDist, ty = cy + Math.sin(trailAngle) * trailDist;
    var trailAlpha = alpha * (0.3 + 0.3 * Math.sin(t * 4 + j));
    ctx.globalAlpha = trailAlpha;
    ctx.beginPath(); ctx.arc(tx, ty, 1.5, 0, Math.PI * 2);
    ctx.fillStyle = '#ffaa22'; ctx.fill();
  }
  ctx.restore();
}

// ==================== PATCH: Cat Expression System ====================
var EXPRESSION_TYPES = [
  { id: 'peek',    emoji: '👀', text: '',             desc: '偷偷看一眼' },
  { id: 'yawn',    emoji: '🥱', text: '',             desc: '打哈欠' },
  { id: 'stretch', emoji: '🐱', text: '~伸懒腰~',    desc: '伸懒腰' },
  { id: 'sneeze',  emoji: '🤧', text: 'ハクション!',  desc: '打喷嚏' },
  { id: 'purr',    emoji: '😺', text: '呼噜呼噜...',  desc: '发出呼噜声' },
  { id: 'sleep',   emoji: '💤', text: '',             desc: '打瞌睡' }
];
var EXPR_DURATION_BASE = [0.8, 1.5];
var EXPR_INTERVAL_BASE = [8, 20];

function _exprRandInterval(mult) {
  var base = EXPR_INTERVAL_BASE[0] + Math.random() * (EXPR_INTERVAL_BASE[1] - EXPR_INTERVAL_BASE[0]);
  return base * Math.max(mult, 0.5);
}

function initExpressions() {
  var mult = 1.0;
  if (typeof ROOMS !== 'undefined' && game.currentRoomIdx !== undefined) {
    mult = ROOMS[game.currentRoomIdx].behaviorMult || 1.0;
  }
  game.cats.forEach(function(cat) {
    cat.expressionTimer = _exprRandInterval(mult);
    cat.activeExpression = null;
    cat.exprParticles = [];
  });
}

function updateExpressions(dt) {
  var mult = 1.0;
  if (typeof ROOMS !== 'undefined' && game.currentRoomIdx !== undefined) {
    mult = ROOMS[game.currentRoomIdx].behaviorMult || 1.0;
  }
  game.cats.forEach(function(cat) {
    if (cat.found) return;
    _updateExprParticles(cat, dt);
    if (cat.activeExpression) {
      cat.activeExpression.timer += dt;
      if (cat.activeExpression.timer >= cat.activeExpression.maxTimer) {
        cat.activeExpression = null;
        cat.expressionTimer = _exprRandInterval(mult);
      }
      return;
    }
    if (cat.expressionTimer === undefined || cat.expressionTimer === null) {
      cat.expressionTimer = _exprRandInterval(mult);
    }
    cat.expressionTimer -= dt;
    if (cat.expressionTimer <= 0) {
      var isBusy = cat.wobbleActive || cat.tailActive || cat.bubbleActive || cat.eyeActive;
      if (isBusy) { cat.expressionTimer = 1 + Math.random() * 2; return; }
      var exprType = EXPRESSION_TYPES[Math.floor(Math.random() * EXPRESSION_TYPES.length)];
      var durationScale = 1.0 / Math.max(mult, 0.5);
      var dur = EXPR_DURATION_BASE[0] + Math.random() * (EXPR_DURATION_BASE[1] - EXPR_DURATION_BASE[0]);
      dur = dur * durationScale; dur = Math.max(dur, 0.4);
      cat.activeExpression = { type: exprType, timer: 0, maxTimer: dur };
      if (exprType.id === 'sneeze') { _spawnSneezeParticles(cat); }
    }
  });
}

function drawCatExpression(ctx, cat, itemX, itemY) {
  if (!cat || cat.found || !cat.activeExpression) {
    if (cat && cat.exprParticles && cat.exprParticles.length > 0) {
      _drawExprParticles(ctx, cat, itemX, itemY);
    }
    return;
  }
  var expr = cat.activeExpression;
  var t = expr.timer / expr.maxTimer;
  var type = expr.type;
  ctx.save();
  switch (type.id) {
    case 'peek': _drawExprPeek(ctx, cat, itemX, itemY, t); break;
    case 'yawn': _drawExprYawn(ctx, cat, itemX, itemY, t, expr); break;
    case 'stretch': _drawExprStretchLabel(ctx, cat, itemX, itemY, t); break;
    case 'sneeze': _drawExprSneeze(ctx, cat, itemX, itemY, t); break;
    case 'purr': _drawExprPurr(ctx, cat, itemX, itemY, t, expr); break;
    case 'sleep': _drawExprSleep(ctx, cat, itemX, itemY, t, expr); break;
  }
  ctx.restore();
  _drawExprParticles(ctx, cat, itemX, itemY);
}

function getCatExpressionScale(cat) {
  var result = { x: 1.0, y: 1.0 };
  if (!cat || !cat.activeExpression) return result;
  var expr = cat.activeExpression;
  var t = expr.timer / expr.maxTimer;
  var type = expr.type;
  if (type.id === 'yawn') {
    var yawnT = Math.sin(t * Math.PI); result.y = 1.0 + yawnT * 0.05;
  } else if (type.id === 'stretch') {
    var stretchT = Math.sin(t * Math.PI); result.x = 1.0 + stretchT * 0.08;
  } else if (type.id === 'sneeze') {
    if (t < 0.2) {
      var shakeT = t / 0.2;
      result.x = 1.0 + Math.sin(shakeT * Math.PI * 6) * 0.03 * (1 - shakeT);
    }
  }
  return result;
}

function _drawExprPeek(ctx, cat, ix, iy, t) {
  var alpha;
  if (t < 0.2) { alpha = t / 0.2; }
  else if (t > 0.6) { alpha = (1 - t) / 0.4; }
  else { alpha = 1.0; }
  alpha = Math.max(0, Math.min(alpha, 1)) * 0.55;
  ctx.globalAlpha = alpha;
  var cx = ix + cat.w * 0.5, cy = iy - 2;
  var peekOffset = -Math.sin(t * Math.PI) * 4;
  var eyeSpacing = cat.w * 0.12;
  eyeSpacing = Math.max(eyeSpacing, 5); eyeSpacing = Math.min(eyeSpacing, 10);
  var eyeR = 2.5;
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.arc(cx - eyeSpacing, cy + peekOffset, eyeR, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + eyeSpacing, cy + peekOffset, eyeR, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(cx - eyeSpacing + 0.8, cy + peekOffset - 0.8, 0.8, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + eyeSpacing + 0.8, cy + peekOffset - 0.8, 0.8, 0, Math.PI * 2); ctx.fill();
}

function _drawExprYawn(ctx, cat, ix, iy, t, expr) {
  var alpha;
  if (t < 0.15) { alpha = t / 0.15; }
  else if (t > 0.7) { alpha = (1 - t) / 0.3; }
  else { alpha = 1.0; }
  alpha = Math.max(0, Math.min(alpha, 1)) * 0.6;
  ctx.globalAlpha = alpha;
  var cx = ix + cat.w * 0.5, floatY = iy - 6 - t * 18;
  ctx.font = '12px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  ctx.fillText('🥱', cx, floatY);
}

function _drawExprStretchLabel(ctx, cat, ix, iy, t) {
  var alpha;
  if (t < 0.2) { alpha = t / 0.2; }
  else if (t > 0.7) { alpha = (1 - t) / 0.3; }
  else { alpha = 1.0; }
  alpha = Math.max(0, Math.min(alpha, 1)) * 0.35;
  ctx.globalAlpha = alpha;
  var cx = ix + cat.w * 0.5, cy = iy - 4;
  ctx.font = '9px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  ctx.fillStyle = '#a0522d'; ctx.fillText('~伸懒腰~', cx, cy);
}

function _drawExprSneeze(ctx, cat, ix, iy, t) {
  if (t < 0.35) {
    var alpha = t < 0.1 ? t / 0.1 : (0.35 - t) / 0.25;
    alpha = Math.max(0, Math.min(alpha, 1)) * 0.7;
    ctx.globalAlpha = alpha;
    var cx = ix + cat.w * 0.5;
    var shake = 0;
    if (t < 0.2) { shake = Math.sin(t * 120) * 3 * (1 - t / 0.2); }
    var cy = iy - 8;
    ctx.font = '11px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillText('🤧', cx + shake, cy);
  }
}

function _drawExprPurr(ctx, cat, ix, iy, t, expr) {
  var notes = ['♪', '♫'];
  var noteCount = 3;
  for (var i = 0; i < noteCount; i++) {
    var noteT = t - i * 0.15;
    if (noteT < 0 || noteT > 0.8) continue;
    var alpha = noteT < 0.15 ? noteT / 0.15 : noteT > 0.6 ? (0.8 - noteT) / 0.2 : 1.0;
    alpha = Math.max(0, Math.min(alpha, 1)) * 0.45;
    ctx.globalAlpha = alpha;
    var cx = ix + cat.w * 0.5 + (i - 1) * 8;
    var floatY = iy - 5 - noteT * 25;
    var waveX = Math.sin(noteT * Math.PI * 3 + i * 1.5) * 5;
    ctx.font = '10px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillStyle = '#d4a574'; ctx.fillText(notes[i % notes.length], cx + waveX, floatY);
  }
}

function _drawExprSleep(ctx, cat, ix, iy, t, expr) {
  var zzCount = 3;
  for (var i = 0; i < zzCount; i++) {
    var zzT = t - i * 0.2;
    if (zzT < 0 || zzT > 0.7) continue;
    var alpha = zzT < 0.1 ? zzT / 0.1 : zzT > 0.5 ? (0.7 - zzT) / 0.2 : 1.0;
    alpha = Math.max(0, Math.min(alpha, 1)) * 0.5;
    ctx.globalAlpha = alpha;
    var baseX = ix + cat.w * 0.6 + i * 5;
    var floatY = iy - 2 - zzT * 30;
    var fontSize = 8 + i * 2 + zzT * 4;
    ctx.font = 'bold ' + Math.round(fontSize) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillStyle = 'rgba(100, 140, 200, ' + alpha + ')';
    ctx.fillText('Z', baseX, floatY);
  }
}

function _spawnSneezeParticles(cat) {
  if (!cat.exprParticles) cat.exprParticles = [];
  for (var i = 0; i < 5; i++) {
    cat.exprParticles.push({
      ox: (Math.random() - 0.5) * cat.w * 0.6, oy: -cat.h * 0.3 * Math.random(),
      vx: (Math.random() - 0.5) * 40, vy: -10 - Math.random() * 20,
      life: 0.5 + Math.random() * 0.4, maxLife: 0.5 + Math.random() * 0.4,
      size: 1.5 + Math.random() * 1.5, color: 'rgba(255,255,255,'
    });
  }
}

function _updateExprParticles(cat, dt) {
  if (!cat.exprParticles || cat.exprParticles.length === 0) return;
  for (var i = cat.exprParticles.length - 1; i >= 0; i--) {
    var p = cat.exprParticles[i];
    p.ox += p.vx * dt; p.oy += p.vy * dt; p.vy += 30 * dt; p.life -= dt;
    if (p.life <= 0) { cat.exprParticles.splice(i, 1); }
  }
}

function _drawExprParticles(ctx, cat, ix, iy) {
  if (!cat.exprParticles || cat.exprParticles.length === 0) return;
  var cx = ix + cat.w * 0.5, cy = iy + cat.h * 0.5;
  ctx.save();
  for (var i = 0; i < cat.exprParticles.length; i++) {
    var p = cat.exprParticles[i];
    var alpha = Math.max(0, p.life / p.maxLife) * 0.6;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = 'rgba(255,255,255,' + alpha + ')';
    ctx.beginPath(); ctx.arc(cx + p.ox, cy + p.oy, p.size, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
}

function render() {
  var ctx = game.ctx, s = game.scale, dpr = game.dpr;
  ctx.clearRect(0, 0, game.canvasW*dpr, game.canvasH*dpr);
  ctx.save();
  ctx.scale(s*dpr, s*dpr);

  // 关卡选择画面
  if (game.state === 'ready') {
    drawLevelSelectScreen(ctx);
    ctx.restore();
    return;
  }

  // 开场动画（两阶段：1.5秒展示 + 3.5秒倒计时）
  if (game.state === 'intro') {
    var total = 5.0, elapsed = total - game.introTimer;
    var room = ROOMS[game.currentRoomIdx];
    ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0, 0, VIEW_W, VIEW_H);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

    if (elapsed < 1.5) {
      // 阶段1：房间名 + emoji 缩放入场
      var p = Math.min(1, elapsed / 0.5);
      var scale = p < 1 ? easeOutBack(p) : 1;
      var fadeIn = Math.min(1, elapsed / 0.4);

      ctx.save();
      ctx.globalAlpha = fadeIn;
      ctx.translate(VIEW_W/2, VIEW_H * 0.35);
      ctx.scale(scale, scale);
      ctx.font = '64px sans-serif';
      ctx.fillText(room.emoji, 0, 0);
      ctx.restore();

      ctx.save();
      ctx.globalAlpha = Math.min(1, Math.max(0, (elapsed - 0.3) / 0.4));
      ctx.font = 'bold 30px sans-serif'; ctx.fillStyle = '#ffd700';
      ctx.fillText(room.name, VIEW_W/2, VIEW_H * 0.50);
      ctx.restore();

      ctx.save();
      ctx.globalAlpha = Math.min(1, Math.max(0, (elapsed - 0.6) / 0.4));
      ctx.font = '16px sans-serif'; ctx.fillStyle = '#aaa';
      ctx.fillText('找出隐藏的 ' + room.catCount + ' 只猫咪', VIEW_W/2, VIEW_H*0.58);
      ctx.font = '13px sans-serif'; ctx.fillStyle = '#777';
      ctx.fillText('❤️x' + room.lives + '  仔细观察可疑的动静...', VIEW_W/2, VIEW_H*0.63);
      ctx.restore();
    } else {
      // 阶段2：倒计时 3..2..1..GO!
      var cdElapsed = elapsed - 1.5;
      var cd = Math.min(3, Math.ceil(game.introTimer));
      var cdText = cd > 0 ? cd.toString() : 'GO!';
      // 每个数字从出现起独立计时弹入
      // "3"从phase2开头, "2"从introTimer=2.0, "1"从introTimer=1.0, "GO!"从introTimer=0
      var cdFrac;
      if (cd <= 0) { cdFrac = -game.introTimer; }
      else if (cd >= 3) { cdFrac = cdElapsed; }
      else { cdFrac = cdElapsed - (3.5 - cd); }
      var cdScale = cdFrac < 0.15 ? easeOutBack(cdFrac / 0.15) : 1;
      var cdAlpha = cdFrac < 0.1 ? cdFrac / 0.1 : 1;

      ctx.save();
      ctx.globalAlpha = cdAlpha;
      ctx.translate(VIEW_W/2, VIEW_H * 0.45);
      ctx.scale(cdScale, cdScale);
      ctx.font = 'bold 64px sans-serif';
      ctx.fillStyle = cd > 0 ? '#ffd700' : '#66ff66';
      ctx.fillText(cdText, 0, 0);
      ctx.restore();

      // 小标题
      ctx.font = '14px sans-serif'; ctx.fillStyle = '#888';
      ctx.fillText(room.emoji + ' ' + room.name, VIEW_W/2, VIEW_H * 0.60);
    }

    ctx.restore();
    return;
  }

  // 震动偏移
  ctx.translate(game.shakeX, game.shakeY);

  // 房间背景（透视）
  ctx.save();
  drawRoomBackground(ctx);
  drawTimeOfDayOverlay(ctx);

  // 深度排序（后方先画，前方后画）
  game.allItems.sort(function(a, b) { return a.depth - b.depth; });

  // 所有物品
  game.allItems.forEach(function(item) {
    if (item.isCat && item.catRef.found) {
      drawFoundCat(ctx, item.catRef);
      return;
    }

    // Patch: relocating cat draws differently
    if (item.isCat && item.catRef.relocating) {
      drawRelocatingCat(ctx, item.catRef);
      return;
    }

    // 计算晃动/呼吸偏移（屏幕像素）
    var offsetX = 0, offsetY = 0;
    if (item.isCat && item.catRef.wobbleActive) {
      offsetX = Math.sin(item.catRef.wobbleElapsed * Math.PI * 8) * item.catRef.wobbleStrength;
    }
    if (item.isCat && item.catRef.personality.breathe && !item.catRef.found) {
      offsetY = Math.sin(Date.now() / 800) * 1.2;
    }
    if (!item.isCat) {
      var fw = getFakeWobble(item.id);
      if (fw) { offsetX = Math.sin(fw.elapsed * Math.PI * 8) * 2.5; }
    }

    var drawBX = item.baseX + offsetX;
    var drawBY = item.baseY + offsetY;

    var itemScale = item.scale || ITEM_SCALE;

    // 地板物品的阴影（让物品"站在"地板上）
    if (item.zone !== 'wall_decor') {
      ctx.save();
      ctx.globalAlpha = 0.10;
      ctx.fillStyle = '#000';
      ctx.translate(item.baseX + offsetX, item.baseY + 2);
      ctx.scale(1, 0.22);
      ctx.beginPath();
      ctx.arc(0, 0, item.w * 0.38, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    // 点错动画
    if (game.wrongItem && game.wrongItem.id === item.id) {
      ctx.save();
      ctx.globalAlpha = 0.5 + Math.sin(game.wrongAnimTimer*20)*0.3;
      ctx.fillStyle = 'rgba(255,50,50,0.3)';
      ctx.fillRect(item.x + offsetX - 4, item.y + offsetY - 4, item.w + 8, item.h + 8);
      ctx.translate(drawBX, drawBY);
      ctx.scale(itemScale, itemScale);
      item.drawFn(ctx, -item.origW/2, -item.origH, item.origW, item.origH);
      ctx.restore();
      return;
    }

    // 绘制物品
    ctx.save();
    ctx.translate(drawBX, drawBY);
    if (item.isCat && item.catRef.activeExpression) {
      var exprScale = getCatExpressionScale(item.catRef);
      ctx.scale(itemScale * exprScale.x, itemScale * exprScale.y);
    } else {
      ctx.scale(itemScale, itemScale);
    }
    item.drawFn(ctx, -item.origW/2, -item.origH, item.origW, item.origH);
    ctx.restore();

    // 猫的穿帮效果（在屏幕坐标系，传入偏移后的bbox坐标）
    if (item.isCat) {
      var catDrawX = item.x + offsetX, catDrawY = item.y + offsetY;
      drawCatTail(ctx, item.catRef, catDrawX, catDrawY);
      drawCatBubble(ctx, item.catRef, catDrawX, catDrawY);
      drawCatEyes(ctx, item.catRef, catDrawX, catDrawY);
      drawCatExpression(ctx, item.catRef, catDrawX, catDrawY);
    }
  });

  // 激光笔光点
  // 提示微光
  drawHint(ctx);
  if (game.laserActive) { drawLaserEffect(ctx); }
  // 猫薄荷效果
  if (game.catnipActive) { drawCatnipEffect(ctx); }
  if (game.featherActive) { drawFeatherEffect(ctx); }
  // 粒子
  drawParticles(ctx);
  // 环境事件
  drawEnvEvent(ctx);
  // Patch: buddy alert effects
  game.cats.forEach(function(c) { if (!c.found) drawBuddyAlert(ctx, c); });

  ctx.restore();
  // 关闭外层 s*dpr+shake 变换
  ctx.restore();

  // 重新应用 s*dpr 变换（不含 shake），让 HUD 坐标与点击坐标对齐
  ctx.save();
  ctx.scale(s*dpr, s*dpr);

  // ---- 以下是固定在屏幕上的 UI ----
  // HUD
  drawHUDEnhanced(ctx);
  drawCombo(ctx);
  // 工具栏
  drawToolbar(ctx);

  // (透视视角无需滚动提示和小地图)

  // Toast
  if (game.toast) {
    ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    var tw = ctx.measureText(game.toast).width;
    DrawUtils.roundRect(ctx, VIEW_W/2-tw/2-15, VIEW_H*0.88-16, tw+30, 32, 12, 'rgba(0,0,0,0.7)');
    ctx.fillStyle = '#fff'; ctx.fillText(game.toast, VIEW_W/2, VIEW_H*0.88);
  }

  // 暂停菜单
  drawPauseMenu(ctx);

  // 过渡动画
  if (game.state === 'win_trans') {
    drawWinTransition(ctx);
  }
  if (game.state === 'lose_trans') {
    drawLoseTransition(ctx);
  }

  // 结算画面
  if (game.state === 'win' || game.state === 'lose') {
    drawEndScreen(ctx);
  }

  // 分享卡片（覆盖在结算上面）
  if (game.subScreen === 'share_card') {
    drawShareCard(ctx);
  }

  // 新手引导覆盖层
  if (game.tutorial && game.state !== 'win' && game.state !== 'lose') {
    drawTutorial(ctx);
  }

  // 成就弹窗（最上层）
  drawAchievePopup(ctx);

  ctx.restore();
}

function drawHUD(ctx) {
  // 顶部栏背景
  DrawUtils.roundRect(ctx, 10, 10, VIEW_W-20, 44, 14, 'rgba(0,0,0,0.55)');
  // 生命
  ctx.font = '18px sans-serif'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff';
  var heartStr = '';

function drawCombo(ctx) {
  var now = Date.now() / 1000;

  // ── 1. Combo background pulse: golden/orange/red border glow ──
  if (game.combo >= 2 && game.state === 'playing') {
    var glowAlpha, glowColor1, glowColor2;
    var pulse = (Math.sin(now * 4) + 1) / 2;
    if (game.combo >= 4) {
      glowAlpha = 0.10 + pulse * 0.05;
      glowColor1 = 'rgba(255,68,34,'; glowColor2 = 'rgba(255,120,0,';
    } else if (game.combo >= 3) {
      glowAlpha = 0.06 + pulse * 0.03;
      glowColor1 = 'rgba(255,170,0,'; glowColor2 = 'rgba(255,200,50,';
    } else {
      glowAlpha = 0.03 + pulse * 0.015;
      glowColor1 = 'rgba(255,215,0,'; glowColor2 = 'rgba(255,235,100,';
    }
    ctx.save();
    var edgeSize = 32 + pulse * 12;
    var gradT = ctx.createLinearGradient(0, 0, 0, edgeSize);
    gradT.addColorStop(0, glowColor1 + glowAlpha + ')'); gradT.addColorStop(1, glowColor1 + '0)');
    ctx.fillStyle = gradT; ctx.fillRect(0, 0, VIEW_W, edgeSize);
    var gradB = ctx.createLinearGradient(0, VIEW_H, 0, VIEW_H - edgeSize);
    gradB.addColorStop(0, glowColor1 + glowAlpha + ')'); gradB.addColorStop(1, glowColor1 + '0)');
    ctx.fillStyle = gradB; ctx.fillRect(0, VIEW_H - edgeSize, VIEW_W, edgeSize);
    var gradL = ctx.createLinearGradient(0, 0, edgeSize, 0);
    gradL.addColorStop(0, glowColor2 + glowAlpha + ')'); gradL.addColorStop(1, glowColor2 + '0)');
    ctx.fillStyle = gradL; ctx.fillRect(0, 0, edgeSize, VIEW_H);
    var gradR = ctx.createLinearGradient(VIEW_W, 0, VIEW_W - edgeSize, 0);
    gradR.addColorStop(0, glowColor2 + glowAlpha + ')'); gradR.addColorStop(1, glowColor2 + '0)');
    ctx.fillStyle = gradR; ctx.fillRect(VIEW_W - edgeSize, 0, edgeSize, VIEW_H);
    if (game.combo >= 4 && pulse > 0.85) {
      ctx.fillStyle = 'rgba(255,68,34,' + ((pulse - 0.85) / 0.15 * 0.06) + ')';
      ctx.fillRect(0, 0, VIEW_W, VIEW_H);
    }
    ctx.restore();
  }

  // ── HUD combo indicator (upgraded) ──
  if (game.combo >= 2 && game.state === 'playing') {
    var pct = game.comboTimer / game.comboWindow;
    var barW = 60, barH = 4;
    var bx = VIEW_W - barW - 18, by = 76;
    var breathe = 1 + Math.sin(now * 5) * 0.06;
    ctx.save();
    ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    var textX = VIEW_W - 22, textY = by - 6;
    ctx.translate(textX, textY); ctx.scale(breathe, breathe); ctx.translate(-textX, -textY);
    ctx.font = 'bold 13px sans-serif';
    ctx.fillStyle = game.combo >= 4 ? '#ff6644' : game.combo >= 3 ? '#ffaa00' : '#ffd700';
    var comboLabel = game.combo >= 3 ? '🔥 ' + game.combo + 'x 连击!' : game.combo + 'x 连击!';
    ctx.fillText(comboLabel, textX, textY);
    ctx.restore();
    DrawUtils.roundRect(ctx, bx, by + 2, barW, barH, 2, 'rgba(255,255,255,0.15)');
    var fillW = barW * pct;
    if (fillW > 0) {
      ctx.save();
      ctx.beginPath();
      var r = 2;
      ctx.moveTo(bx + r, by + 2); ctx.lineTo(bx + fillW - r, by + 2);
      ctx.arcTo(bx + fillW, by + 2, bx + fillW, by + 2 + r, r);
      ctx.lineTo(bx + fillW, by + 2 + barH - r);
      ctx.arcTo(bx + fillW, by + 2 + barH, bx + fillW - r, by + 2 + barH, r);
      ctx.lineTo(bx + r, by + 2 + barH);
      ctx.arcTo(bx, by + 2 + barH, bx, by + 2 + barH - r, r);
      ctx.lineTo(bx, by + 2 + r);
      ctx.arcTo(bx, by + 2, bx + r, by + 2, r);
      ctx.closePath(); ctx.clip();
      var barGrad = ctx.createLinearGradient(bx, 0, bx + fillW, 0);
      if (game.combo >= 4) { barGrad.addColorStop(0, '#ff4422'); barGrad.addColorStop(0.5, '#ff8800'); barGrad.addColorStop(1, '#ffcc00'); }
      else if (game.combo >= 3) { barGrad.addColorStop(0, '#ffaa00'); barGrad.addColorStop(1, '#ffd700'); }
      else { barGrad.addColorStop(0, '#ffd700'); barGrad.addColorStop(1, '#ffee88'); }
      ctx.fillStyle = barGrad; ctx.fillRect(bx, by + 2, fillW, barH);
      ctx.restore();
    }
  }

  // ── Combo popup (bigger, with streak trail) ──
  if (game.comboPopup) {
    var p = game.comboPopup;
    var prog = 1 - p.timer / 1.5;
    var alpha = prog < 0.7 ? 1 : 1 - (prog - 0.7) / 0.3;
    var rise = prog * 40;
    var baseScale = prog < 0.15 ? easeOutBack(prog / 0.15) : 1;
    var sx = p.x - game.camX, sy = p.y - game.camY - rise;
    var fontSize, color, prefix;
    if (p.count >= 4) { fontSize = 40; color = '#ff4422'; prefix = '🔥🔥 '; }
    else if (p.count >= 3) { fontSize = 32; color = '#ffaa00'; prefix = '🔥 '; }
    else { fontSize = 24; color = '#ffd700'; prefix = ''; }
    var label = prefix + p.count + 'x COMBO!';
    // Ghost afterimages
    if (p.count >= 3) {
      ctx.save(); ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      for (var gi = 3; gi >= 1; gi--) {
        ctx.globalAlpha = alpha * (0.12 / gi);
        ctx.font = 'bold ' + Math.round(fontSize * baseScale * (1 - gi * 0.08)) + 'px sans-serif';
        ctx.fillStyle = color;
        ctx.fillText(label, sx, sy + gi * 14);
      }
      ctx.restore();
    }
    // Main popup
    ctx.save(); ctx.globalAlpha = alpha; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    var shakeX = 0, shakeY = 0;
    if (p.count >= 4 && prog < 0.5) {
      var shakeI = (1 - prog / 0.5) * 3;
      shakeX = Math.sin(now * 47) * shakeI; shakeY = Math.cos(now * 53) * shakeI;
    }
    ctx.font = 'bold ' + Math.round(fontSize * baseScale) + 'px sans-serif';
    ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 3;
    ctx.strokeText(label, sx + shakeX, sy + shakeY);
    ctx.fillStyle = color; ctx.fillText(label, sx + shakeX, sy + shakeY);
    ctx.restore();
  }
}

function drawLaserEffect(ctx) {
  var pulse = 0.6 + Math.sin(Date.now()/80) * 0.4;
  // 光晕
  ctx.save();
  ctx.globalAlpha = 0.3 * pulse;
  ctx.beginPath(); ctx.arc(game.laserX, game.laserY, 18, 0, Math.PI*2);
  ctx.fillStyle = '#ff2200'; ctx.fill();
  ctx.restore();
  // 光点
  ctx.save();
  ctx.globalAlpha = 0.9;
  ctx.beginPath(); ctx.arc(game.laserX, game.laserY, 4, 0, Math.PI*2);
  ctx.fillStyle = '#ff3300'; ctx.fill();
  ctx.beginPath(); ctx.arc(game.laserX, game.laserY, 2, 0, Math.PI*2);
  ctx.fillStyle = '#ff8866'; ctx.fill();
  ctx.restore();
}

function drawCatnipEffect(ctx) {
  var progress = 1 - game.catnipTimer / 3.0;
  var alpha = progress < 0.2 ? progress/0.2 * 0.6 : progress > 0.7 ? (1-progress)/0.3 * 0.6 : 0.6;
  ctx.save(); ctx.globalAlpha = alpha;
  // 范围圈
  ctx.beginPath(); ctx.arc(game.catnipX, game.catnipY, game.catnipRadius, 0, Math.PI*2);
  ctx.strokeStyle = '#66dd66'; ctx.lineWidth = 2; ctx.setLineDash([8,4]); ctx.stroke(); ctx.setLineDash([]);
  // 中心猫薄荷叶子
  var t = Date.now() / 1000;
  for (var i = 0; i < 6; i++) {
    var angle = (i/6)*Math.PI*2 + t*0.5;
    var dist = 8 + Math.sin(t*2+i)*4;
    var lx = game.catnipX + Math.cos(angle)*dist;
    var ly = game.catnipY + Math.sin(angle)*dist;
    ctx.beginPath();
    ctx.ellipse(lx, ly, 5, 3, angle, 0, Math.PI*2);
    ctx.fillStyle = '#44cc44'; ctx.fill();
  }
  // 散发的粒子
  for (var j = 0; j < 8; j++) {
    var pa = (j/8)*Math.PI*2 + t;
    var pd = game.catnipRadius * (0.3 + Math.sin(t+j*1.5)*0.2);
    var px = game.catnipX + Math.cos(pa)*pd;
    var py = game.catnipY + Math.sin(pa)*pd;
    ctx.globalAlpha = alpha * 0.5;
    ctx.beginPath(); ctx.arc(px, py, 2, 0, Math.PI*2);
    ctx.fillStyle = '#88ee88'; ctx.fill();
  }
  ctx.restore();
}

function calcStars() {
  if (game.state !== 'win' && game.state !== 'win_trans') return 0;
  if (game.mistakes === 0) return 3;
  if (game.mistakes === 1) return 2;
  return 1;
}

function drawWinTransition(ctx) {
  var total = 1.5, elapsed = total - game.transTimer;
  var p = Math.min(1, elapsed / total);

  // 渐暗背景
  ctx.fillStyle = 'rgba(0,0,0,' + (p * 0.5) + ')';
  ctx.fillRect(0, 0, VIEW_W, VIEW_H);

  // 星星依次飞入
  var stars = calcStars();
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (var i = 0; i < 3; i++) {
    var starDelay = 0.2 + i * 0.3;
    var sp = Math.max(0, Math.min(1, (elapsed - starDelay) / 0.4));
    if (sp <= 0) continue;
    var scale = easeOutBack(sp);
    var sx = VIEW_W/2 - 50 + i * 50;
    var sy = VIEW_H * 0.42;
    ctx.save();
    ctx.globalAlpha = sp;
    ctx.translate(sx, sy);
    ctx.scale(scale, scale);
    ctx.font = '44px sans-serif';
    ctx.fillText(i < stars ? '⭐' : '☆', 0, 0);
    ctx.restore();
  }

  // "通关!" 文字
  if (elapsed > 0.8) {
    var tp = Math.min(1, (elapsed - 0.8) / 0.3);
    ctx.save();
    ctx.globalAlpha = tp;
    ctx.font = 'bold 32px sans-serif'; ctx.fillStyle = '#ffd700';
    ctx.fillText('通关!', VIEW_W/2, VIEW_H * 0.55);
    ctx.restore();
  }
}

function drawLoseTransition(ctx) {
  var total = 1.0, elapsed = total - game.transTimer;
  var p = Math.min(1, elapsed / total);

  // 红色闪光 → 渐暗
  var flashAlpha = p < 0.2 ? p / 0.2 * 0.3 : 0.3 * (1 - (p - 0.2) / 0.8);
  ctx.fillStyle = 'rgba(255,0,0,' + flashAlpha + ')';
  ctx.fillRect(0, 0, VIEW_W, VIEW_H);

  // 渐暗叠加
  ctx.fillStyle = 'rgba(0,0,0,' + (p * 0.6) + ')';
  ctx.fillRect(0, 0, VIEW_W, VIEW_H);

  // "游戏结束" 下落
  if (elapsed > 0.3) {
    var tp = Math.min(1, (elapsed - 0.3) / 0.4);
    var dropY = (1 - tp) * -30;
    ctx.save();
    ctx.globalAlpha = tp;
    ctx.font = 'bold 30px sans-serif'; ctx.fillStyle = '#ff5555';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('游戏结束', VIEW_W/2, VIEW_H * 0.45 + dropY);
    ctx.restore();
  }
}

function drawEndScreen(ctx) {
  ctx.fillStyle = 'rgba(0,0,0,0.70)'; ctx.fillRect(0, 0, VIEW_W, VIEW_H);
  var room = ROOMS[game.currentRoomIdx];
  var isWin = game.state === 'win';
  var stars = calcStars();

  // ── 卡片容器 ──
  var cardW = 320, cardH = isWin ? 420 : 360;
  var cardX = (VIEW_W - cardW) / 2, cardY = (VIEW_H - cardH) / 2 - 10;

  // 卡片背景（深色磨砂 + 金色边框）
  ctx.save();
  DrawUtils.roundRect(ctx, cardX, cardY, cardW, cardH, 20, 'rgba(20,18,35,0.95)');
  ctx.strokeStyle = isWin ? 'rgba(255,215,0,0.4)' : 'rgba(255,100,100,0.3)';
  ctx.lineWidth = 2;
  DrawUtils.roundRect(ctx, cardX, cardY, cardW, cardH, 20, null, ctx.strokeStyle);

  var cx = VIEW_W / 2;

  // ── 顶部装饰 ──
  ctx.font = '40px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(isWin ? '🎉' : '😿', cx, cardY + 35);

  // 标题
  ctx.font = 'bold 26px sans-serif';
  ctx.fillStyle = isWin ? '#ffd700' : '#ff7777';
  ctx.fillText(isWin ? '全部找到!' : '游戏结束', cx, cardY + 70);

  // 分隔线
  ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(cardX + 30, cardY + 90); ctx.lineTo(cardX + cardW - 30, cardY + 90); ctx.stroke();

  // ── 房间信息 ──
  ctx.font = '16px sans-serif'; ctx.fillStyle = '#bbb';
  ctx.fillText(room.emoji + ' ' + room.name, cx, cardY + 110);

  // ── 统计信息（两列布局）──
  var statY = cardY + 140;
  var leftX = cardX + cardW * 0.30, rightX = cardX + cardW * 0.70;

  // 找到数
  ctx.font = 'bold 28px sans-serif'; ctx.fillStyle = '#ffd700';
  ctx.fillText(game.foundCount + '/' + game.catCount, leftX, statY);
  ctx.font = '11px sans-serif'; ctx.fillStyle = '#888';
  ctx.fillText('猫咪', leftX, statY + 18);

  // 用时
  var mins = Math.floor(game.playTime / 60);
  var secs = Math.floor(game.playTime % 60);
  var timeStr = (mins < 10 ? '0' : '') + mins + ':' + (secs < 10 ? '0' : '') + secs;
  ctx.font = 'bold 28px sans-serif'; ctx.fillStyle = '#88ccff';
  ctx.fillText(timeStr, rightX, statY);
  ctx.font = '11px sans-serif'; ctx.fillStyle = '#888';
  ctx.fillText('用时', rightX, statY + 18);

  // 第二行统计
  var stat2Y = statY + 48;

  }
}
