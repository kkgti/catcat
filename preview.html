// ==================== 粒子 & 提示 ====================
function spawnParticles(cx, cy, intensity) {
  if (intensity === undefined) intensity = 1.0;
  if (game.particles.length > 200) return;
  var symbols = ['⭐', '✨', '💛', '🐱', '❤️'];
  var confettiColors = ['#FF6B6B', '#FFD93D', '#6BCB77', '#4D96FF', '#FF6FC8', '#C084FC', '#F97316', '#22D3EE'];
  // Emoji particles
  var emojiCount = Math.round(12 * intensity);
  for (var i = 0; i < emojiCount; i++) {
    var angle = (i / emojiCount) * Math.PI * 2 + (Math.random() - 0.5) * 0.5;
    var speed = (100 + Math.random() * 120) * intensity;
    var life = 0.8 + Math.random() * 0.6;
    game.particles.push({ type: 'emoji', x: cx, y: cy, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 60 * intensity,
      life: life, maxLife: life, alpha: 1, symbol: symbols[i % symbols.length], size: 10 + Math.random() * 8,
      rot: Math.random() * Math.PI * 2, rotSpeed: (Math.random() - 0.5) * 6 });
  }
  // Ring particles
  var ringCount = Math.round(3 * intensity);
  for (var r = 0; r < ringCount; r++) {
    var ringLife = 0.5 + Math.random() * 0.4;
    game.particles.push({ type: 'ring', x: cx, y: cy, vx: 0, vy: 0, life: ringLife, maxLife: ringLife,
      alpha: 1, radius: 4 + r * 6, growSpeed: (80 + Math.random() * 60) * intensity, lineWidth: 2.5 - r * 0.5 });
  }
  // Confetti particles
  var confettiCount = Math.round(8 * intensity);
  for (var c = 0; c < confettiCount; c++) {
    var cAngle = (c / confettiCount) * Math.PI * 2 + (Math.random() - 0.5) * 0.8;
    var cSpeed = (60 + Math.random() * 100) * intensity;
    var cLife = 1.0 + Math.random() * 0.8;
    game.particles.push({ type: 'confetti', x: cx + (Math.random()-0.5)*10, y: cy + (Math.random()-0.5)*10,
      vx: Math.cos(cAngle) * cSpeed, vy: Math.sin(cAngle) * cSpeed - 40 * intensity,
      life: cLife, maxLife: cLife, alpha: 1, rot: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 12, color: confettiColors[c % confettiColors.length] });
  }
  // Trail particles
  var trailCount = Math.round(6 * intensity);
  for (var t = 0; t < trailCount; t++) {
    var tAngle = Math.random() * Math.PI * 2;
    var tSpeed = (40 + Math.random() * 60) * intensity;
    var tLife = 0.3 + Math.random() * 0.3;
    game.particles.push({ type: 'trail', x: cx + (Math.random()-0.5)*16, y: cy + (Math.random()-0.5)*16,
      vx: Math.cos(tAngle) * tSpeed, vy: Math.sin(tAngle) * tSpeed - 20,
      life: tLife, maxLife: tLife, alpha: 0.7, symbol: symbols[Math.floor(Math.random() * symbols.length)], size: 6 + Math.random() * 4 });
  }
  game.screenFlash = 0.15;
}

function drawParticles(ctx) {
  // Screen flash overlay
  if (game.screenFlash && game.screenFlash > 0) {
    ctx.save(); ctx.globalAlpha = Math.min(game.screenFlash / 0.15, 1.0) * 0.45;
    ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0, 0, VIEW_W, VIEW_H);
    ctx.restore();
  }
  if (!game.particles.length) return;
  for (var i = 0; i < game.particles.length; i++) {
    var p = game.particles[i];
    ctx.save();
    if (p.type === 'emoji') {
      ctx.globalAlpha = p.alpha * 0.9; ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.font = Math.round(p.size) + 'px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(p.symbol, 0, 0);
    } else if (p.type === 'ring') {
      ctx.globalAlpha = p.alpha * 0.7; ctx.strokeStyle = '#FFD700';
      ctx.lineWidth = p.lineWidth * (p.life / p.maxLife);
      ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.stroke();
    } else if (p.type === 'confetti') {
      ctx.globalAlpha = p.alpha * 0.85; ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.fillStyle = p.color; ctx.fillRect(-2.5, -1.5, 5, 3);
    } else if (p.type === 'trail') {
      ctx.globalAlpha = p.alpha * 0.6;
      ctx.font = Math.round(p.size) + 'px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(p.symbol, p.x, p.y);
    }
    ctx.restore();
  }
}

function drawHint(ctx) {
  if (!game.hintCat || game.hintAlpha <= 0) return;
  var cat = game.hintCat;
  var cx = cat.x + cat.w / 2;
  var cy = cat.y + cat.h / 2;
  var radius = Math.max(cat.w, cat.h) * 0.7;
  var pulse = Math.sin(Date.now() / 200) * 0.15;
  ctx.save();
  ctx.globalAlpha = (0.2 + pulse) * game.hintAlpha;
  var grad = ctx.createRadialGradient(cx, cy, radius * 0.3, cx, cy, radius);
  grad.addColorStop(0, 'rgba(255,215,0,0.5)');
  grad.addColorStop(1, 'rgba(255,215,0,0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// ==================== 新手引导 ====================
var TUT_STEPS = [
  { id: 'observe', text: '观察房间，有东西在微微晃动...', sub: '', duration: 0, waitTap: false },
  { id: 'tap',     text: '点击它！', sub: '', duration: 0, waitTap: true },
  { id: 'found',   text: '太棒了！找到了！', sub: '继续找剩下的猫咪吧', duration: 2.0, waitTap: false },
];

function updateTutorial(dt) {
  if (!game.tutorial) return;
  var tut = game.tutorial;
  var step = TUT_STEPS[tut.step];
  if (!step) { game.tutorial = null; return; }

  tut.timer += dt;

  if (step.id === 'observe') {
    var cat = game.cats[0];
    if (cat && !cat.found) {
      cat.wobbleActive = true; cat.wobbleElapsed = (cat.wobbleElapsed + dt) % 1.0;
      cat.wobbleDuration = 999; cat.wobbleStrength = 5;
    }
    if (tut.timer >= 3.0) { tut.step++; tut.timer = 0; }
  }

  if (step.id === 'tap') {
    var cat = game.cats[0];
    if (cat && !cat.found) {
      cat.wobbleActive = true; cat.wobbleElapsed = (cat.wobbleElapsed + dt) % 1.0;
      cat.wobbleDuration = 999; cat.wobbleStrength = 5;
      tut.tapTarget = cat;
    } else {
      tut.step = 2; tut.timer = 0;
    }
  }

  if (step.id === 'found' && tut.timer >= step.duration) {
    saveTutorialDone();
    game.tutorial = null;
    var cat = game.cats[0];
    if (cat && !cat.found) {
      cat.wobbleActive = false;
      cat.wobbleTimer = randRange(cat.personality.wobbleCooldown);
      cat.wobbleStrength = cat.personality.wobbleStrength * (ROOMS[game.currentRoomIdx].wobbleStrengthMult || 1);
    }
  }
}

function drawTutorial(ctx) {
  if (!game.tutorial) return;
  var tut = game.tutorial;
  var step = TUT_STEPS[tut.step];
  if (!step) return;
  var now = Date.now();

  ctx.save();

  // --- 背景遮罩 + 目标高亮 ---
  if (step.id === 'observe') {
    ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fillRect(0, 0, VIEW_W, VIEW_H);
    var cat = game.cats[0];
    if (cat && !cat.found) {
      // 浮动手指指向猫
      var bobY = Math.sin(now / 350) * 8;
      ctx.save();
      ctx.font = '32px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.fillStyle = '#fff'; ctx.shadowColor = 'rgba(255,215,0,0.8)'; ctx.shadowBlur = 12;
      ctx.fillText('👆', cat.x + cat.w / 2, cat.y - 10 + bobY);
      ctx.restore();
    }
  } else if (step.id === 'tap' && tut.tapTarget) {
    var cat = tut.tapTarget;
    var tcx = cat.x + cat.w / 2, tcy = cat.y + cat.h / 2;
    var r = Math.max(cat.w, cat.h) * 0.65;
    // 暗遮罩挖出圆形
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.beginPath(); ctx.rect(0, 0, VIEW_W, VIEW_H);
    ctx.arc(tcx, tcy, r, 0, Math.PI * 2, true); ctx.fill();
    // 脉动高亮圈
    var pulse = Math.sin(now / 300) * 0.3 + 0.7;
    ctx.strokeStyle = 'rgba(255,215,0,' + pulse.toFixed(2) + ')'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(tcx, tcy, r + 4, 0, Math.PI * 2); ctx.stroke();
    // 扩散圈
    var expand = (now % 1200) / 1200;
    ctx.strokeStyle = 'rgba(255,215,0,' + ((1 - expand) * 0.5).toFixed(2) + ')'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(tcx, tcy, r + 4 + expand * 18, 0, Math.PI * 2); ctx.stroke();
    // 手指
    var bobY2 = Math.sin(now / 350) * 8;
    ctx.save();
    ctx.font = '32px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillStyle = '#fff'; ctx.shadowColor = 'rgba(255,215,0,0.8)'; ctx.shadowBlur = 12;
    ctx.fillText('👆', tcx, tcy + r + 10 + bobY2);
    ctx.restore();
  } else if (step.id === 'found') {
    ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(0, 0, VIEW_W, VIEW_H);
  } else {
    ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(0, 0, VIEW_W, VIEW_H);
  }

  // --- 分步气泡 ---
  var bubbleW = 380, bubbleH = step.sub ? 85 : 55;
  var bubbleX = VIEW_W / 2 - bubbleW / 2;
  var bubbleY = VIEW_H * 0.15;
  // 滑入动画
  var slideT = Math.min(tut.timer / 0.3, 1);
  bubbleY += (1 - slideT * slideT) * (-20);
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.4)'; ctx.shadowBlur = 16; ctx.shadowOffsetY = 4;
  DrawUtils.roundRect(ctx, bubbleX, bubbleY, bubbleW, bubbleH, 16, 'rgba(20,20,30,0.9)');
  ctx.shadowColor = 'transparent';
  ctx.strokeStyle = 'rgba(255,215,0,0.6)'; ctx.lineWidth = 1.5;
  DrawUtils.roundRect(ctx, bubbleX, bubbleY, bubbleW, bubbleH, 16, null, 'rgba(255,215,0,0.6)');
  // 步骤指示点
  var dotSpacing = 14, dotsW = (TUT_STEPS.length - 1) * dotSpacing;
  var dotStartX = VIEW_W / 2 - dotsW / 2, dotY = bubbleY + bubbleH - 12;
  for (var di = 0; di < TUT_STEPS.length; di++) {
    ctx.beginPath(); ctx.arc(dotStartX + di * dotSpacing, dotY, di === tut.step ? 3.5 : 2, 0, Math.PI * 2);
    ctx.fillStyle = di === tut.step ? '#ffd700' : 'rgba(255,255,255,0.3)'; ctx.fill();
  }
  // 主文字
  ctx.font = 'bold 17px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#ffd700';
  ctx.fillText(step.text, VIEW_W / 2, step.sub ? bubbleY + 28 : bubbleY + bubbleH / 2);
  if (step.sub) { ctx.font = '14px sans-serif'; ctx.fillStyle = '#ddd'; ctx.fillText(step.sub, VIEW_W / 2, bubbleY + 55); }
  ctx.restore();

  // "点击继续"提示
  if (!step.waitTap && step.duration === 0) {
    var alpha = 0.4 + Math.sin(now / 500) * 0.3;
    ctx.globalAlpha = alpha;
    ctx.font = '13px sans-serif'; ctx.fillStyle = '#aaa'; ctx.textAlign = 'center';
    ctx.fillText('点击任意处继续', VIEW_W / 2, bubbleY + bubbleH + 20);
    ctx.globalAlpha = 1;
  }

  // 跳过按钮
  var skipX = VIEW_W - 80, skipY = bubbleY - 30, skipW = 60, skipH = 28;
  ctx.globalAlpha = 0.6;
  DrawUtils.roundRect(ctx, skipX, skipY, skipW, skipH, 10, 'rgba(255,255,255,0.15)');
  ctx.font = '12px sans-serif'; ctx.fillStyle = '#ccc'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('跳过', skipX + skipW / 2, skipY + skipH / 2);
  ctx.globalAlpha = 1;
  tut.skipBtn = { x: skipX, y: skipY, w: skipW, h: skipH };
  ctx.restore();
}

function handleTutorialTap(vx, vy) {
  if (!game.tutorial) return false;
  var tut = game.tutorial;
  var step = TUT_STEPS[tut.step];
  if (!step) return false;

  if (tut.skipBtn) {
    var sb = tut.skipBtn;
    if (vx >= sb.x && vx <= sb.x + sb.w && vy >= sb.y && vy <= sb.y + sb.h) {
      saveTutorialDone(); game.tutorial = null;
      var cat = game.cats[0];
      if (cat && !cat.found) {
        cat.wobbleActive = false;
        cat.wobbleTimer = randRange(cat.personality.wobbleCooldown);
        cat.wobbleStrength = cat.personality.wobbleStrength * (ROOMS[game.currentRoomIdx].wobbleStrengthMult || 1);
      }
      return true;
    }
  }

  if (step.waitTap) return false;
  if (step.duration > 0) return true;
  tut.step++; tut.timer = 0;
  return true;
}

// ==================== 触控处理 ====================
function screenToView(sx, sy) {
  var rect = game.canvas.getBoundingClientRect();
  return { x: (sx - rect.left) / game.scale, y: (sy - rect.top) / game.scale };
}

function handleTouchStart(sx, sy) {
  var v = screenToView(sx, sy);
  game.touchStartX = v.x;
  game.touchStartY = v.y;
  game.touchStartTime = Date.now();
  game.isDragging = false;
  game._lastTouchY = v.y;
}

function handleTouchMove(sx, sy) {
  var v = screenToView(sx, sy);
  var dx = v.x - game.touchStartX;
  var dy = v.y - game.touchStartY;
  if (Math.abs(dx) > 5 || Math.abs(dy) > 5) game.isDragging = true;

  // 图鉴/成就面板滚动
  if (game.subScreen === 'codex' || game.subScreen === 'achieve') {
    var prevY = game._lastTouchY || v.y;
    var delta = prevY - v.y;
    var scrollKey = game.subScreen === 'codex' ? 'codexScrollY' : 'achieveScrollY';
    var maxKey = game.subScreen === 'codex' ? 'codexMaxScroll' : 'achieveMaxScroll';
    game[scrollKey] = Math.max(0, Math.min(game[maxKey] || 0, (game[scrollKey] || 0) + delta));
  }
  game._lastTouchY = v.y;
}

function handleTouchEnd(sx, sy) {
  if (game.isDragging) return;
  var v = screenToView(sx, sy);
  var elapsed = Date.now() - game.touchStartTime;
  if (elapsed > 500) return;
  handleTap(v.x, v.y);
}

function handleTap(vx, vy) {
  // 分享卡片画面
  if (game.subScreen === 'share_card') {
    if (game._shareCardSaveBtn) {
      var svb = game._shareCardSaveBtn;
      if (vx >= svb.x && vx <= svb.x+svb.w && vy >= svb.y && vy <= svb.y+svb.h) {
        SFX.tap(); saveShareCardAsImage(); return;
      }
    }
    if (game._shareCardBackBtn) {
      var bkb = game._shareCardBackBtn;
      if (vx >= bkb.x && vx <= bkb.x+bkb.w && vy >= bkb.y && vy <= bkb.y+bkb.h) {
        SFX.tap(); game.subScreen = null; return;
      }
    }
    return;
  }

  // 关卡选择画面
  if (game.state === 'ready') {
    handleLevelSelectTap(vx, vy);
    return;
  }

  // 新手引导拦截
  if (game.tutorial && handleTutorialTap(vx, vy)) return;

  // 结算画面按钮
  if (game.state === 'win' || game.state === 'lose') {
    // 重玩
    if (game.retryBtn) {
      var b = game.retryBtn;
      if (vx >= b.x && vx <= b.x+b.w && vy >= b.y && vy <= b.y+b.h) { SFX.tap(); initGame(); return; }
    }
    // 下一关
    if (game.nextLevelBtn) {
      var nb = game.nextLevelBtn;
      if (vx >= nb.x && vx <= nb.x+nb.w && vy >= nb.y && vy <= nb.y+nb.h) {
        SFX.tap(); initGame(game.currentRoomIdx + 1); return;
      }
    }
    // 返回选关
    if (game.selectBtn) {
      var sb = game.selectBtn;
      if (vx >= sb.x && vx <= sb.x+sb.w && vy >= sb.y && vy <= sb.y+sb.h) {
        SFX.tap(); showLevelSelect(); return;
      }
    }
    // 分享按钮
    if (game.shareBtn) {
      var shb = game.shareBtn;
      if (vx >= shb.x && vx <= shb.x+shb.w && vy >= shb.y && vy <= shb.y+shb.h) {
        SFX.tap(); game.subScreen = 'share_card'; return;
      }
    }
    return;
  }

  // 暂停菜单按钮点击
  if (game.paused) {
    if (game.pauseResumeBtn) {
      var pr = game.pauseResumeBtn;
      if (vx >= pr.x && vx <= pr.x+pr.w && vy >= pr.y && vy <= pr.y+pr.h) {
        SFX.tap(); game.paused = false; AmbientSound.startAmbient(ROOMS[game.currentRoomIdx].id); return;
      }
    }
    if (game.pauseRetryBtn) {
      var pt = game.pauseRetryBtn;
      if (vx >= pt.x && vx <= pt.x+pt.w && vy >= pt.y && vy <= pt.y+pt.h) {
        SFX.tap(); game.paused = false; initGame(); return;
      }
    }
    if (game.pauseSelectBtn) {
      var ps = game.pauseSelectBtn;
      if (vx >= ps.x && vx <= ps.x+ps.w && vy >= ps.y && vy <= ps.y+ps.h) {
        SFX.tap(); game.paused = false; showLevelSelect(); return;
      }
    }
    return; // 暂停时拦截所有其他点击
  }

  // 暂停按钮（游戏中）
  if (game.pauseBtn && game.state === 'playing') {
    var pb = game.pauseBtn;
    if (vx >= pb.x && vx <= pb.x+pb.w && vy >= pb.y && vy <= pb.y+pb.h) {
      SFX.tap(); game.paused = true; AmbientSound.stopAmbient(); return;
    }
  }

  // 音量按钮（任何游戏状态都可用）
  if (game.muteBtn) {
    var mb = game.muteBtn;
    if (vx >= mb.x && vx <= mb.x+mb.w && vy >= mb.y && vy <= mb.y+mb.h) {
      SFX.toggleMute(); return;
    }
  }

  if (game.state !== 'playing') return;

  // 检查工具栏按钮点击
  for (var t = 0; t < game.toolBtns.length; t++) {
    var tb = game.toolBtns[t];
    if (vx >= tb.x && vx <= tb.x+tb.w && vy >= tb.y && vy <= tb.y+tb.h) {
      handleToolBtnClick(tb.type);
      return;
    }
  }

  // 等距视角：视口坐标 = 房间坐标（无相机偏移）
  var rx = vx;
  var ry = vy;

  // 如果激光笔模式激活，使用激光笔
  if (game.activeTool === 'laser' && game.laserCooldown <= 0) {
    game.laserActive = true;
    game._usedLaser = true;
    SFX.toolUse();
    game.laserX = rx; game.laserY = ry;
    game.laserTargetX = rx; game.laserTargetY = ry;
    game.laserTimer = 2.5;
    game.laserCooldown = game.laserMaxCD;
    game.activeTool = null;
    game.toast = '激光笔启动! 观察猫的反应...'; game.toastTimer = 1.5;
    return;
  }

  // Patch: feather wand activation
  if (game.activeTool === 'feather' && game.featherCooldown <= 0) {
    handleFeatherActivation(rx, ry); return;
  }

  if (isSteamObscuring() && pointInSteam(rx, ry)) {
    var currentRoom = ROOMS[game.currentRoomIdx] || {};
    if (game.steamTapCooldown <= 0) {
      var steamGain = currentRoom.steamTouchGain || ALERTNESS_RULES.steamTapGain;
      if (getAlertnessRatio() >= ALERTNESS_RULES.dangerThreshold) {
        steamGain *= 0.5;
      }
      addAlertness(steamGain);
      game.steamTapCooldown = ALERTNESS_RULES.steamTapCooldown;
    }
    game.toast = '蒸汽太浓了，看清再下手';
    game.toastTimer = 0.8;
    if (game.steamTouchPenalty) {
      game.steamTouchPenalty = false;
      game.shakeTimer = 0.15;
    }
    return;
  }

  // 检查点击了哪个物品（从上层往下找）
  var hit = null;
  for (var i = game.allItems.length - 1; i >= 0; i--) {
    var item = game.allItems[i];
    if (item.isCat && item.catRef.found) continue;
    if (rx >= item.x && rx <= item.x + item.w && ry >= item.y && ry <= item.y + item.h) {
      hit = item; break;
    }
  }

  if (!hit) return;

  if (hit.isCat) {
    // 找到猫!
    SFX.catFound();
    hit.catRef.found = true;
    hit.catRef.foundAnim = 0;
    game.foundCount++;
    game.currentFoundCat = hit.catRef;
    game.animTimer = 2.0;
    game.state = 'found_anim';
    game.toast = '找到了【' + hit.catRef.personality.name + '】!'; game.toastTimer = 2.0;
    game._lastFoundTime = 0;
    game.hintTimer = 0; game.hintCat = null;
    spawnParticles(hit.catRef.x + hit.catRef.w/2, hit.catRef.y + hit.catRef.h/2);
    // 引导模式：找到第一只猫后进入 found 步骤
    if (game.tutorial && game.tutorial.step <= 1) {
      game.tutorial.step = 2; game.tutorial.timer = 0;
    }
    // 图鉴收录
    var isNewCodex = recordCodex(hit.catRef.disguiseId);
    if (isNewCodex) {
      game.toast = '📖 新图鉴! 找到了【' + hit.catRef.personality.name + '】!';
    }
    // 连击系统
    game.combo++;
    game.comboTimer = game.comboWindow;
    if (game.combo > game.maxCombo) game.maxCombo = game.combo;
    if (game.combo >= 2) {
      game.comboPopup = { count: game.combo, timer: 1.5, x: hit.catRef.x + hit.catRef.w/2, y: hit.catRef.y - 10 };
      // 高连击额外粒子 + 屏幕震动
      if (game.combo >= 3) {
        spawnParticles(hit.catRef.x + hit.catRef.w/2, hit.catRef.y + hit.catRef.h/2, 1.5);
        game.shakeTimer = 0.15;
      }
      if (game.combo >= 4) { unlockAchievement('combo_king'); }
    }
    // 成就：初次接触 + 累计猫数
    game.totalCatsFound++;
    unlockAchievement('first_cat');
    if (game.totalCatsFound >= 30) unlockAchievement('cat_master');
    // Patch: buddy cat found
    onBuddyCatFound(hit.catRef);
    addAlertness(-ALERTNESS_RULES.findCatReduce);
  } else {
    // 引导模式 tap 步骤：点错不扣血
    if (game.tutorial && game.tutorial.step === 1) {
      game.toast = '不是这个哦，找晃动的那个！'; game.toastTimer = 1.0;
      return;
    }
    // 点错了
    SFX.wrong();
    game.combo = 0; game.comboTimer = 0;
    game.lives--; game.mistakes++;
    addAlertness(ALERTNESS_RULES.wrongTapGain);
    game.wrongItem = hit;
    game.wrongAnimTimer = 0.6;
    game.shakeTimer = 0.3;
    game.state = 'wrong_anim';
    game.toast = '这不是猫咪! -1 ❤️'; game.toastTimer = 1.0;
  }
}

function handleToolBtnClick(type) {
  if (type === 'laser') {
    if (game.laserCooldown > 0 || game.laserActive) {
      game.toast = '激光笔冷却中...'; game.toastTimer = 0.8;
      return;
    }
    if (game.activeTool === 'laser') {
      game.activeTool = null; // 取消选择
    } else {
      game.activeTool = 'laser';
      addAlertness(ALERTNESS_RULES.laserGain);
      game.toast = '点击房间中任意位置使用激光笔'; game.toastTimer = 1.5;
    }
  } else if (type === 'catnip') {
    if (game.catnipCooldown > 0 || game.catnipActive) {
      game.toast = '猫薄荷冷却中...'; game.toastTimer = 0.8;
      return;
    }
    // 直接在视口中心使用
    game.catnipActive = true;
    game._usedCatnip = true;
    addAlertness(ALERTNESS_RULES.catnipGain);
    SFX.toolUse();
    game.catnipX = VIEW_W / 2;
    game.catnipY = (BACK_B + FLOOR_B) / 2;
    game.catnipTimer = 3.0;
    game.catnipCooldown = game.catnipMaxCD;
    game.activeTool = null;
    game.toast = '猫薄荷散发香气... 观察附近的物品!'; game.toastTimer = 2.0;
  } else if (type === 'feather') {
    handleFeatherToolBtnClick();
  }
}

// ==================== 关卡选择（Canvas）====================
function drawLevelSelectScreen(ctx) {
  // 背景渐变
  var grad = ctx.createLinearGradient(0, 0, 0, VIEW_H);
  grad.addColorStop(0, '#1a1a2e');
  grad.addColorStop(0.5, '#16213e');
  grad.addColorStop(1, '#0f3460');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, VIEW_W, VIEW_H);

  var cx = VIEW_W / 2;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  // 标题
  ctx.font = '60px sans-serif';
  ctx.fillText('🐱', cx, 52);
  ctx.font = 'bold 28px sans-serif'; ctx.fillStyle = '#ffd700';
  ctx.fillText('变身躲猫猫', cx, 100);
  ctx.font = '12px sans-serif'; ctx.fillStyle = '#aaa';
  ctx.fillText('Prop Hunt - 找出伪装的猫咪!', cx, 122);

  // 提示卡片
  var tipW = 280, tipH = 60, tipX = cx - tipW/2, tipY = 140;
  DrawUtils.roundRect(ctx, tipX, tipY, tipW, tipH, 12, 'rgba(255,255,255,0.08)');
  ctx.font = '12px sans-serif'; ctx.fillStyle = '#ddd';
  ctx.fillText('猫咪变成了房间里的物品', cx, tipY + 16);
  ctx.fillText('观察可疑动静，点击找出所有猫咪', cx, tipY + 34);
  ctx.fillText('小心！点错会扣一颗心 ❤️', cx, tipY + 52);

  // 关卡卡片
  game.levelCards = [];
  var cardW = 105, cardH = 130, gap = 12;
  var cols = Math.min(ROOMS.length, 3);
  var totalW = cols * cardW + (cols - 1) * gap;
  var startX = cx - totalW / 2;
  var startY = tipY + tipH + 18;

  ROOMS.forEach(function(room, idx) {
    var row = Math.floor(idx / 3), col = idx % 3;
    // 居中最后一行
    var rowCols = Math.min(3, ROOMS.length - row * 3);
    var rowW = rowCols * cardW + (rowCols - 1) * gap;
    var rx = cx - rowW / 2 + col * (cardW + gap);
    var ry = startY + row * (cardH + gap);

    var prog = levelProgress[room.id] || { unlocked: idx === 0, stars: 0 };

    // 卡片背景
    var cardBg = prog.unlocked ? 'rgba(255,255,255,0.08)' : 'rgba(255,255,255,0.03)';
    var borderCol = prog.unlocked ? 'rgba(255,255,255,0.15)' : 'rgba(255,255,255,0.06)';
    DrawUtils.roundRect(ctx, rx, ry, cardW, cardH, 14, cardBg);
    ctx.strokeStyle = borderCol; ctx.lineWidth = 2;
    DrawUtils.roundRect(ctx, rx, ry, cardW, cardH, 14, null, borderCol);

    ctx.save();
    if (!prog.unlocked) ctx.globalAlpha = 0.4;

    var ccx = rx + cardW / 2;
    if (prog.unlocked) {
      // emoji
      ctx.font = '36px sans-serif'; ctx.textAlign = 'center'; ctx.fillStyle = '#fff';
      ctx.fillText(room.emoji, ccx, ry + 32);
      // 名称
      ctx.font = 'bold 15px sans-serif'; ctx.fillStyle = '#fff';
      ctx.fillText(room.name, ccx, ry + 58);
      // 描述
      ctx.font = '11px sans-serif'; ctx.fillStyle = '#aaa';
      ctx.fillText(room.desc, ccx, ry + 78);
      // 星星
      ctx.font = '16px sans-serif'; ctx.fillStyle = '#fff';
      var starStr = '';
      for (var s = 0; s < 3; s++) starStr += s < prog.stars ? '⭐' : '☆';
      ctx.fillText(starStr, ccx, ry + 102);
    } else {
      // 锁
      ctx.font = '28px sans-serif'; ctx.textAlign = 'center'; ctx.fillStyle = '#fff';
      ctx.fillText('🔒', ccx, ry + 38);
      ctx.font = 'bold 15px sans-serif'; ctx.fillStyle = '#fff';
      ctx.fillText(room.name, ccx, ry + 66);
      ctx.font = '11px sans-serif'; ctx.fillStyle = '#aaa';
      ctx.fillText('通关上一关解锁', ccx, ry + 86);
    }
    ctx.restore();

    game.levelCards.push({ x: rx, y: ry, w: cardW, h: cardH, idx: idx, unlocked: prog.unlocked });
  });

  // 底部按钮区
  var btnY = startY + Math.ceil(ROOMS.length / 3) * (cardH + gap) + 8;
  var btnW = 180, btnH = 36;

  // 成就按钮
  var abx = cx - btnW / 2;
  DrawUtils.roundRect(ctx, abx, btnY, btnW, btnH, 20, 'rgba(255,215,0,0.15)');
  ctx.strokeStyle = 'rgba(255,215,0,0.4)'; ctx.lineWidth = 2;
  DrawUtils.roundRect(ctx, abx, btnY, btnW, btnH, 20, null, ctx.strokeStyle);
  ctx.font = 'bold 13px sans-serif'; ctx.fillStyle = '#ffd700'; ctx.textAlign = 'center';
  var aCount = 0;
  for (var k in game.achievements) { if (game.achievements[k]) aCount++; }
  ctx.fillText('🏆 成就 ' + aCount + '/' + ACHIEVEMENTS.length, cx, btnY + btnH / 2);
  game.achieveBtnRect = { x: abx, y: btnY, w: btnW, h: btnH };

  // 图鉴按钮
  var cbY = btnY + btnH + 10;
  DrawUtils.roundRect(ctx, abx, cbY, btnW, btnH, 20, 'rgba(100,200,255,0.12)');
  ctx.strokeStyle = 'rgba(100,200,255,0.35)'; ctx.lineWidth = 2;
  DrawUtils.roundRect(ctx, abx, cbY, btnW, btnH, 20, null, ctx.strokeStyle);
  ctx.fillStyle = '#88ccff';
  var cc = getCodexCount();
  ctx.fillText('📖 图鉴 ' + cc.found + '/' + cc.total, cx, cbY + btnH / 2);
  game.codexBtnRect = { x: abx, y: cbY, w: btnW, h: btnH };

  // 子面板
  if (game.subScreen === 'achieve') drawAchieveSubScreen(ctx);
  if (game.subScreen === 'codex') drawCodexSubScreen(ctx);
}

function drawAchieveSubScreen(ctx) {
  ctx.fillStyle = 'rgba(0,0,0,0.70)';
  ctx.fillRect(0, 0, VIEW_W, VIEW_H);

  var panelW = 340, panelH = Math.min(420, VIEW_H - 80);
  var px = (VIEW_W - panelW) / 2, py = (VIEW_H - panelH) / 2;
  DrawUtils.roundRect(ctx, px, py, panelW, panelH, 16, 'rgba(15,15,30,0.95)');
  ctx.strokeStyle = 'rgba(255,215,0,0.4)'; ctx.lineWidth = 2;
  DrawUtils.roundRect(ctx, px, py, panelW, panelH, 16, null, ctx.strokeStyle);

  // 标题
  ctx.font = 'bold 18px sans-serif'; ctx.fillStyle = '#ffd700';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText('🏆 成就墙', px + 16, py + 24);

  // 关闭按钮
  ctx.font = '18px sans-serif'; ctx.fillStyle = '#999'; ctx.textAlign = 'right';
  ctx.fillText('✕', px + panelW - 16, py + 24);
  game.subCloseBtn = { x: px + panelW - 40, y: py + 8, w: 36, h: 32 };

  // 可滚动内容区域
  var headerH = 48;
  var contentTop = py + headerH;
  var contentH = panelH - headerH - 12;
  var scrollY = game.achieveScrollY || 0;

  var cols = 2, itemW = 148, itemH = 70, gapX = 10, gapY = 10;
  var rows = Math.ceil(ACHIEVEMENTS.length / cols);
  var totalContentH = rows * (itemH + gapY) - gapY + 12;
  game.achieveMaxScroll = Math.max(0, totalContentH - contentH);
  if (scrollY > game.achieveMaxScroll) { scrollY = game.achieveMaxScroll; game.achieveScrollY = scrollY; }

  // 裁剪
  ctx.save();
  ctx.beginPath();
  ctx.rect(px + 4, contentTop, panelW - 8, contentH);
  ctx.clip();

  var gridX = px + (panelW - cols * itemW - gapX) / 2;
  var gridY = contentTop + 6 - scrollY;

  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ACHIEVEMENTS.forEach(function(a, i) {
    var done = !!game.achievements[a.id];
    var col = i % cols, row = Math.floor(i / cols);
    var ix = gridX + col * (itemW + gapX);
    var iy = gridY + row * (itemH + gapY);

    if (iy + itemH < contentTop - 10 || iy > contentTop + contentH + 10) return;

    ctx.save();
    if (!done) ctx.globalAlpha = 0.4;
    var bg = done ? 'rgba(255,215,0,0.08)' : 'rgba(255,255,255,0.05)';
    var border = done ? 'rgba(255,215,0,0.5)' : 'rgba(255,255,255,0.1)';
    DrawUtils.roundRect(ctx, ix, iy, itemW, itemH, 10, bg);
    ctx.strokeStyle = border; ctx.lineWidth = 1;
    DrawUtils.roundRect(ctx, ix, iy, itemW, itemH, 10, null, border);

    var icx = ix + itemW / 2;
    ctx.font = '26px sans-serif'; ctx.fillStyle = '#fff';
    ctx.fillText(done ? a.icon : '🔒', icx, iy + 22);
    ctx.font = 'bold 11px sans-serif'; ctx.fillStyle = '#fff';
    ctx.fillText(a.name, icx, iy + 42);
    ctx.font = '10px sans-serif'; ctx.fillStyle = '#aaa';
    ctx.fillText(a.desc, icx, iy + 58);
    ctx.restore();
  });
  ctx.restore();

  // 滚动条
  if (game.achieveMaxScroll > 0) {
    var trackH = contentH - 8;
    var thumbH = Math.max(24, trackH * contentH / totalContentH);
    var thumbY = contentTop + 4 + (trackH - thumbH) * (scrollY / game.achieveMaxScroll);
    DrawUtils.roundRect(ctx, px + panelW - 10, thumbY, 4, thumbH, 2, 'rgba(255,255,255,0.25)');
  }
}

function drawCodexSubScreen(ctx) {
  ctx.fillStyle = 'rgba(0,0,0,0.70)';
  ctx.fillRect(0, 0, VIEW_W, VIEW_H);

  var panelW = 350, panelH = Math.min(480, VIEW_H - 80);
  var px = (VIEW_W - panelW) / 2, py = (VIEW_H - panelH) / 2;
  DrawUtils.roundRect(ctx, px, py, panelW, panelH, 16, 'rgba(10,15,30,0.96)');
  ctx.strokeStyle = 'rgba(100,200,255,0.4)'; ctx.lineWidth = 2;
  DrawUtils.roundRect(ctx, px, py, panelW, panelH, 16, null, ctx.strokeStyle);

  // 标题
  var cc = getCodexCount();
  ctx.font = 'bold 18px sans-serif'; ctx.fillStyle = '#88ccff';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText('📖 猫咪图鉴 ' + cc.found + '/' + cc.total, px + 16, py + 24);

  // 关闭
  ctx.font = '18px sans-serif'; ctx.fillStyle = '#999'; ctx.textAlign = 'right';
  ctx.fillText('✕', px + panelW - 16, py + 24);
  game.subCloseBtn = { x: px + panelW - 40, y: py + 8, w: 36, h: 32 };

  // 进度条
  var pct = cc.total > 0 ? Math.round(cc.found / cc.total * 100) : 0;
  var barX = px + 16, barY = py + 44, barW = panelW - 32, barH = 16;
  DrawUtils.roundRect(ctx, barX, barY, barW, barH, 8, 'rgba(255,255,255,0.1)');
  if (pct > 0) {
    DrawUtils.roundRect(ctx, barX, barY, barW * pct / 100, barH, 8, 'rgba(100,200,255,0.5)');
  }
  ctx.font = 'bold 10px sans-serif'; ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
  ctx.fillText(pct + '%', barX + barW / 2, barY + barH / 2);

  // 可滚动内容区域（留8px上下内边距）
  var headerH = 70;
  var contentTop = py + headerH;
  var contentH = panelH - headerH - 12;
  var scrollY = game.codexScrollY || 0;

  // 先计算总内容高度
  var itemW = 72, itemH = 48, gapX = 8, gridCols = 4;
  var totalContentH = 0;
  CODEX_ROOMS.forEach(function(room) {
    totalContentH += 20; // 房间标题
    var dRows = Math.ceil(room.disguises.length / gridCols);
    totalContentH += dRows * (itemH + 6) + 12;
  });
  game.codexMaxScroll = Math.max(0, totalContentH - contentH);
  if (scrollY > game.codexMaxScroll) { scrollY = game.codexMaxScroll; game.codexScrollY = scrollY; }

  // 裁剪可滚动区域
  ctx.save();
  ctx.beginPath();
  ctx.rect(px + 4, contentTop, panelW - 8, contentH);
  ctx.clip();

  var curY = contentTop + 6 - scrollY;
  ctx.textBaseline = 'middle';
  var gridStartX = px + (panelW - gridCols * itemW - (gridCols - 1) * gapX) / 2;

  CODEX_ROOMS.forEach(function(room) {
    var roomFound = 0;
    room.disguises.forEach(function(d) { if (codex[d.id]) roomFound++; });

    ctx.font = 'bold 12px sans-serif'; ctx.fillStyle = '#ffd700'; ctx.textAlign = 'left';
    ctx.fillText(room.emoji + ' ' + room.name + ' (' + roomFound + '/' + room.disguises.length + ')', px + 16, curY + 6);
    curY += 20;

    room.disguises.forEach(function(d, di) {
      var col = di % gridCols, row = Math.floor(di / gridCols);
      var ix = gridStartX + col * (itemW + gapX);
      var iy = curY + row * (itemH + 6);

      // 跳过完全不可见的卡片
      if (iy + itemH < contentTop - 10 || iy > contentTop + contentH + 10) return;

      var found = !!codex[d.id];
      ctx.save();
      if (!found) ctx.globalAlpha = 0.35;
      var bg = found ? 'rgba(100,200,255,0.1)' : 'rgba(255,255,255,0.03)';
      var border = found ? 'rgba(100,200,255,0.3)' : 'rgba(255,255,255,0.08)';
      DrawUtils.roundRect(ctx, ix, iy, itemW, itemH, 8, bg);
      ctx.strokeStyle = border; ctx.lineWidth = 1;
      DrawUtils.roundRect(ctx, ix, iy, itemW, itemH, 8, null, border);

      ctx.textAlign = 'center';
      ctx.font = '22px sans-serif'; ctx.fillStyle = '#fff';
      ctx.fillText(found ? '🐱' : '❓', ix + itemW / 2, iy + 18);
      ctx.font = '9px sans-serif'; ctx.fillStyle = found ? '#ccc' : '#666';
      ctx.fillText(found ? d.name : '???', ix + itemW / 2, iy + 38);
      ctx.restore();
    });

    var dRows = Math.ceil(room.disguises.length / gridCols);
    curY += dRows * (itemH + 6) + 12;
  });
  ctx.restore();

  // 滚动条指示器
  if (game.codexMaxScroll > 0) {
    var trackH = contentH - 8;
    var thumbH = Math.max(24, trackH * contentH / totalContentH);
    var thumbY = contentTop + 4 + (trackH - thumbH) * (scrollY / game.codexMaxScroll);
    DrawUtils.roundRect(ctx, px + panelW - 10, thumbY, 4, thumbH, 2, 'rgba(255,255,255,0.25)');
  }
}

function handleLevelSelectTap(vx, vy) {
  // 子面板打开时，只处理关闭按钮
  if (game.subScreen) {
    if (game.subCloseBtn) {
      var cb = game.subCloseBtn;
      if (vx >= cb.x && vx <= cb.x+cb.w && vy >= cb.y && vy <= cb.y+cb.h) {
        SFX.tap(); game.subScreen = null; return;
      }
    }
    return; // 子面板拦截所有其他点击
  }

  // 关卡卡片
  for (var i = 0; i < game.levelCards.length; i++) {
    var lc = game.levelCards[i];
    if (vx >= lc.x && vx <= lc.x+lc.w && vy >= lc.y && vy <= lc.y+lc.h) {
      if (lc.unlocked) {
        SFX.tap(); startLevel(lc.idx);
      }
      return;
    }
  }

  // 成就按钮
  if (game.achieveBtnRect) {
    var ab = game.achieveBtnRect;
    if (vx >= ab.x && vx <= ab.x+ab.w && vy >= ab.y && vy <= ab.y+ab.h) {
      SFX.tap(); game.subScreen = 'achieve'; game.achieveScrollY = 0; return;
    }
  }

  // 图鉴按钮
  if (game.codexBtnRect) {
    var cb2 = game.codexBtnRect;
    if (vx >= cb2.x && vx <= cb2.x+cb2.w && vy >= cb2.y && vy <= cb2.y+cb2.h) {
      SFX.tap(); game.subScreen = 'codex'; game.codexScrollY = 0; return;
    }
  }
}


function startLevel(idx) {
  initGame(idx);
  if (!game.rafId) gameLoop();
}

function showLevelSelect() {
  AmbientSound.stopAmbient();
  game.state = 'ready';
  game.subScreen = null;
  // 保持游戏循环运行以渲染关卡选择画面
  if (!game.rafId) gameLoop();
}

// ==================== 游戏循环 ====================
function gameLoop() {
  update();
  render();
  game.rafId = requestAnimationFrame(gameLoop);
}

// ==================== 启动 ====================
window.addEventListener('DOMContentLoaded', function() {
  var canvas = document.getElementById('gameCanvas');
  var ctx = canvas.getContext('2d');
  var dpr = window.devicePixelRatio || 1;

  var aspect = VIEW_W / VIEW_H;
  var cw, ch;
  if (window.innerWidth / window.innerHeight < aspect) {
    cw = window.innerWidth; ch = cw / aspect;
  } else {
    ch = window.innerHeight; cw = ch * aspect;
  }
  canvas.style.width = cw + 'px';
  canvas.style.height = ch + 'px';
  canvas.width = cw * dpr;
  canvas.height = ch * dpr;

  game.canvas = canvas; game.ctx = ctx;
  game.canvasW = cw; game.canvasH = ch;
  game.scale = cw / VIEW_W; game.dpr = dpr;

  // 事件绑定
  canvas.addEventListener('mousedown', function(e){ handleTouchStart(e.clientX, e.clientY); });
  canvas.addEventListener('mousemove', function(e){ if(e.buttons) handleTouchMove(e.clientX, e.clientY); });
  canvas.addEventListener('mouseup', function(e){ handleTouchEnd(e.clientX, e.clientY); });
  canvas.addEventListener('touchstart', function(e){ e.preventDefault(); var t=e.touches[0]; handleTouchStart(t.clientX, t.clientY); });
  canvas.addEventListener('touchmove', function(e){ e.preventDefault(); var t=e.touches[0]; handleTouchMove(t.clientX, t.clientY); });
  canvas.addEventListener('touchend', function(e){ e.preventDefault(); var t=e.changedTouches[0]; handleTouchEnd(t.clientX, t.clientY); });

  // 隐藏 HTML 关卡选择，使用 Canvas 版
  document.getElementById('startScreen').classList.add('hidden');
  // 启动游戏循环（初始状态 ready → 渲染关卡选择画面）
  gameLoop();
});
</script>
